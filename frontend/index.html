<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyTube">
<meta name="theme-color" content="#050505">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>MyTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #050505;
  --surface:  #111;
  --surface2: #1a1a1a;
  --surface3: #242424;
  --border:   #272727;
  --text:     #f1f1f1;
  --text2:    #909090;
  --text3:    #525252;
  --accent:   #ff4444;
  --accent2:  #ff6b6b;
  --radius:   12px;
  --sidebar:  230px;
  --safe-top:    env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
body { overflow-x: hidden; }

/* ══ LAYOUT ══════════════════════════════════════════════════════════════════ */
/* Desktop: sidebar fixe + contenu scrollable */
@media (min-width: 900px) {
  body { padding-bottom: 0; }
  .mobile-header, .bottom-nav { display: none !important; }
  .sidebar { display: flex !important; }
  .app-body { margin-left: var(--sidebar); }
}
/* Mobile: header + bottom nav, pas de sidebar */
@media (max-width: 899px) {
  .sidebar { display: none !important; }
  .app-body { margin-left: 0; }
  body { padding-bottom: calc(64px + var(--safe-bottom)); }
}

/* ══ SIDEBAR ═════════════════════════════════════════════════════════════════ */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar);
  background: var(--bg); border-right: 1px solid var(--border);
  display: none; flex-direction: column; z-index: 50; overflow-y: auto;
}
.sidebar-logo {
  font-size: 22px; font-weight: 700; letter-spacing: -0.6px;
  color: var(--text); padding: 22px 22px 18px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo span { color: var(--accent); }
.sidebar-search-wrap {
  padding: 14px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-search-wrap input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 9px 14px; border-radius: 8px; outline: none; transition: border-color .2s;
}
.sidebar-search-wrap input:focus { border-color: var(--accent); }
.sidebar-search-wrap input::placeholder { color: var(--text3); }
.sidebar-nav { padding: 10px 0; flex: 1; }
.sidebar-btn {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 12px 22px;
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; text-align: left;
  transition: background .15s, color .15s; position: relative;
}
.sidebar-btn:hover { background: var(--surface2); color: var(--text); }
.sidebar-btn.active { color: var(--accent); }
.sidebar-btn.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.sidebar-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ══ MOBILE HEADER ═══════════════════════════════════════════════════════════ */
.mobile-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(5,5,5,.96); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: calc(12px + var(--safe-top)) 16px 12px;
  display: flex; align-items: center; gap: 12px;
}
.mobile-logo {
  font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text); text-decoration: none; flex-shrink: 0;
}
.mobile-logo span { color: var(--accent); }
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  padding: 9px 42px 9px 14px; border-radius: 50px; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }
.search-btn {
  position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
  background: var(--accent); border: none; color: #fff; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; transition: background .2s;
}
.search-btn:hover { background: var(--accent2); }
.search-btn svg { width: 14px; height: 14px; }

/* ══ MAIN ════════════════════════════════════════════════════════════════════ */
.app-body { min-height: 100vh; }
main { padding: 20px; max-width: 1500px; margin: 0 auto; }
@media (min-width: 900px) { main { padding: 28px 32px; } }

/* Desktop search bar in content */
.content-search {
  display: none; gap: 10px; margin-bottom: 28px;
}
@media (min-width: 900px) { .content-search { display: flex; } }
.content-search input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  padding: 12px 20px; border-radius: 50px; outline: none; transition: border-color .2s;
}
.content-search input:focus { border-color: var(--accent); }
.content-search input::placeholder { color: var(--text3); }
.content-search button {
  background: var(--accent); border: none; color: #fff; cursor: pointer;
  padding: 12px 22px; border-radius: 50px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; transition: background .2s;
  display: flex; align-items: center; gap: 8px; white-space: nowrap;
}
.content-search button:hover { background: var(--accent2); }
.content-search button svg { width: 15px; height: 15px; }

/* ══ SECTION TITLE ═══════════════════════════════════════════════════════════ */
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 18px; display: flex; align-items: center; gap: 12px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ══ GRILLE VIDÉOS ═══════════════════════════════════════════════════════════ */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 20px;
}
@media (max-width: 599px)  { .video-grid { grid-template-columns: 1fr; gap: 12px; } }
@media (min-width: 600px) and (max-width: 899px) { .video-grid { grid-template-columns: repeat(2,1fr); gap: 14px; } }

/* ══ CARDS ═══════════════════════════════════════════════════════════════════ */
.video-card {
  background: var(--surface); border-radius: var(--radius); overflow: hidden;
  cursor: pointer; border: 1px solid transparent;
  transition: transform .22s ease, box-shadow .22s ease, border-color .22s;
}
.video-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 16px 48px rgba(0,0,0,.65);
  border-color: var(--border);
}
.video-card:active { transform: scale(.97); }
.thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
.thumb-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform .3s ease;
}
.video-card:hover .thumb-wrap img { transform: scale(1.04); }
.thumb-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.72) 0%, transparent 55%);
  pointer-events: none;
}
.duration-badge {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(0,0,0,.92); color: #fff;
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 2px 7px; border-radius: 5px; font-weight: 500;
}
.sb-badge {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,185,80,.92); color: #fff;
  font-size: 9px; font-weight: 800; padding: 2px 6px;
  border-radius: 4px; letter-spacing: .06em;
}
.card-info { padding: 12px 14px 14px; }
.card-title {
  font-size: 14px; font-weight: 500; line-height: 1.42; color: var(--text);
  margin-bottom: 7px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta { font-size: 12px; color: var(--text2); display: flex; flex-wrap: wrap; align-items: center; gap: 3px; }
.card-meta .sep { color: var(--text3); }

/* ══ SKELETON LOADING ════════════════════════════════════════════════════════ */
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 20px;
}
@media (max-width: 599px)  { .skeleton-grid { grid-template-columns: 1fr; gap: 12px; } }
@media (min-width: 600px) and (max-width: 899px) { .skeleton-grid { grid-template-columns: repeat(2,1fr); gap: 14px; } }
.sk-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.sk-thumb { aspect-ratio: 16/9; animation: sk-pulse 1.6s ease-in-out infinite; }
.sk-body { padding: 12px 14px; }
.sk-line {
  border-radius: 6px; animation: sk-pulse 1.6s ease-in-out infinite;
  height: 13px; margin-bottom: 9px;
}
.sk-line.w80 { width: 80%; }
.sk-line.w50 { width: 50%; }
@keyframes sk-pulse {
  0%, 100% { background: var(--surface2); }
  50%       { background: var(--surface3); }
}

/* ══ PLAYER VIEW ═════════════════════════════════════════════════════════════ */
#player-view  { display: none; }
#player-view.active { display: block; }
#home-view.hidden   { display: none; }

.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 7px 16px; border-radius: 50px; cursor: pointer;
  margin-bottom: 18px; transition: all .2s;
}
.back-btn:hover { background: var(--surface3); color: var(--text); }

.player-layout { display: flex; gap: 22px; align-items: flex-start; }
.player-main   { flex: 1; min-width: 0; }
.player-sidebar { width: 360px; flex-shrink: 0; }
@media (max-width: 1180px) { .player-layout { flex-direction: column; } .player-sidebar { width: 100%; } }

.player-wrap {
  background: #000; border-radius: var(--radius); overflow: hidden;
  position: relative; margin-bottom: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,.7);
}
video { width: 100%; display: block; max-height: 66vh; background: #000; }

/* Métadonnées vidéo */
.player-title { font-size: 18px; font-weight: 600; line-height: 1.3; margin-bottom: 12px; }
.player-channel {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 14px; margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.channel-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.channel-name  { font-size: 14px; font-weight: 600; color: var(--text); }
.channel-stats { font-size: 12px; color: var(--text2); margin-top: 1px; }
.player-desc   { font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 6px; }

/* ══ QUALITY BAR ═════════════════════════════════════════════════════════════ */
.quality-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.q-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-right: 4px; }
.q-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; font-family: 'DM Mono', monospace;
  padding: 5px 12px; border-radius: 8px; cursor: pointer; transition: all .15s;
}
.q-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.q-btn:hover:not(.active) { background: var(--surface3); color: var(--text); }

/* ══ SPONSORBLOCK ════════════════════════════════════════════════════════════ */
.sb-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px;
}
.sb-panel-title {
  font-size: 10px; font-weight: 800; color: #00c864;
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.sb-segment {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text2); padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.sb-segment:last-child { border-bottom: none; }
.sb-cat { color: var(--text); font-weight: 600; font-size: 12px; }

/* ══ RELATED CARDS ═══════════════════════════════════════════════════════════ */
.related-section-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.related-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.related-card {
  display: flex; gap: 10px; cursor: pointer;
  padding: 8px; border-radius: 10px;
  transition: background .15s; margin-bottom: 2px;
}
.related-card:hover  { background: var(--surface2); }
.related-card:active { transform: scale(.98); }
.related-thumb {
  position: relative; width: 148px; flex-shrink: 0;
  aspect-ratio: 16/9; border-radius: 8px; overflow: hidden;
  background: var(--surface2);
}
.related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.related-info { flex: 1; min-width: 0; padding-top: 2px; }
.related-title {
  font-size: 13px; font-weight: 500; line-height: 1.38; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 5px;
}
.related-meta { font-size: 11px; color: var(--text2); }
@media (max-width: 599px) { .related-thumb { width: 118px; } }

/* ══ AUTO-NEXT OVERLAY ═══════════════════════════════════════════════════════ */
.autonext-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.86); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 10; border-radius: var(--radius);
}
.autonext-overlay.hidden { display: none; }
.autonext-content { text-align: center; padding: 24px; max-width: 320px; }
.autonext-label {
  font-size: 10px; font-weight: 800; color: var(--text2);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px;
}
.autonext-countdown {
  font-size: 68px; font-weight: 700; color: var(--accent);
  font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 12px;
}
.autonext-next-title {
  font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 20px;
}
.autonext-cancel-btn {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; padding: 9px 24px; border-radius: 50px;
  cursor: pointer; transition: background .2s;
}
.autonext-cancel-btn:hover { background: rgba(255,255,255,.2); }

/* ══ ÉTATS ═══════════════════════════════════════════════════════════════════ */
.loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 64px 20px; gap: 14px; color: var(--text3);
  font-size: 14px;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 64px 20px; color: var(--text3); }
.empty-icon { font-size: 52px; margin-bottom: 14px; opacity: .25; }
.empty-text { font-size: 15px; }

/* ══ BOTTOM NAV ══════════════════════════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(5,5,5,.97);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex; padding-bottom: var(--safe-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 0; cursor: pointer; color: var(--text3);
  background: none; border: none; font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: .02em;
  transition: color .15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 21px; height: 21px; }

/* ══ TOAST ═══════════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface3); border: 1px solid var(--border); color: var(--text);
  font-size: 13px; padding: 9px 20px; border-radius: 50px;
  opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; white-space: nowrap; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@media (min-width: 900px) { .toast { bottom: 28px; } }
</style>
</head>
<body>

<!-- ── Sidebar (desktop uniquement) ── -->
<aside class="sidebar">
  <div class="sidebar-logo">My<span>Tube</span></div>
  <div class="sidebar-search-wrap">
    <input type="search" id="search-sidebar" placeholder="Rechercher…"
           onkeydown="if(event.key==='Enter') doSearch(this.value)">
  </div>
  <nav class="sidebar-nav">
    <button class="sidebar-btn active" id="snav-home" onclick="showHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      Accueil
    </button>
    <button class="sidebar-btn" id="snav-trending" onclick="loadTrending()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22,7 13.5,15.5 8.5,10.5 2,17"/>
        <polyline points="16,7 22,7 22,13"/>
      </svg>
      Tendances
    </button>
  </nav>
</aside>

<!-- ── Header mobile ── -->
<header class="mobile-header">
  <a class="mobile-logo" href="#" onclick="showHome(); return false;">My<span>Tube</span></a>
  <div class="search-wrap">
    <input type="search" id="search-mobile" placeholder="Rechercher…"
           onkeydown="if(event.key==='Enter') doSearch(this.value)">
    <button class="search-btn" onclick="doSearch(document.getElementById('search-mobile').value)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>
</header>

<!-- ── Corps principal ── -->
<div class="app-body">
<main>

  <!-- Vue accueil / recherche -->
  <div id="home-view">
    <div class="content-search">
      <input type="search" id="search-desktop" placeholder="Rechercher des vidéos…"
             onkeydown="if(event.key==='Enter') doSearch(this.value)">
      <button onclick="doSearch(document.getElementById('search-desktop').value)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Rechercher
      </button>
    </div>
    <div id="content"></div>
  </div>

  <!-- Vue lecteur -->
  <div id="player-view">
    <button class="back-btn" onclick="showHome()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour
    </button>

    <div class="player-layout">
      <div class="player-main">
        <div class="player-wrap">
          <video id="player" controls playsinline webkit-playsinline preload="metadata"></video>
          <div id="autonext-overlay" class="autonext-overlay hidden">
            <div class="autonext-content">
              <div class="autonext-label">À suivre dans</div>
              <div class="autonext-countdown" id="autonext-count">5</div>
              <div class="autonext-next-title" id="autonext-next-title"></div>
              <button class="autonext-cancel-btn" onclick="cancelAutoNext()">Annuler</button>
            </div>
          </div>
        </div>
        <div class="quality-bar" id="quality-bar"></div>
        <div id="sb-panel"></div>
        <div id="video-meta"></div>
      </div>
      <div class="player-sidebar">
        <div id="related-panel"></div>
      </div>
    </div>
  </div>

</main>
</div>

<!-- ── Bottom nav mobile ── -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
    Accueil
  </button>
  <button class="nav-btn" id="nav-search" onclick="focusSearch()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    Recherche
  </button>
  <button class="nav-btn" id="nav-trending" onclick="loadTrending()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22,7 13.5,15.5 8.5,10.5 2,17"/>
      <polyline points="16,7 22,7 22,13"/>
    </svg>
    Tendances
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = '';

// ── État ──────────────────────────────────────────────────────────────────────
let currentVideoId  = null;
let sbSegments      = [];
let sbActive        = true;
let sbCheckInterval = null;
let relatedVideos   = [];
let autoNextTimer   = null;

// ── Utilitaires ───────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s) return '';
  s = Math.round(s);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtViews(n) {
  if (!n) return '';
  if (n >= 1e9) return `${(n/1e9).toFixed(1)}G vues`;
  if (n >= 1e6) return `${(n/1e6).toFixed(1)}M vues`;
  if (n >= 1e3) return `${(n/1e3).toFixed(0)}K vues`;
  return `${n} vues`;
}
function fmtDate(s) {
  if (!s || s.length < 8) return '';
  return `${s.slice(6,8)}/${s.slice(4,6)}/${s.slice(0,4)}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}
// Génère une couleur déterministe à partir du nom de la chaîne
function channelColor(name) {
  const palette = ['#e74c3c','#e67e22','#f39c12','#27ae60','#16a085','#2980b9','#8e44ad','#c0392b','#d35400','#1abc9c'];
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return palette[Math.abs(h) % palette.length];
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showHome() {
  document.getElementById('player-view').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  const player = document.getElementById('player');
  player.pause(); player.src = '';
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  cancelAutoNext();
  sbSegments = []; relatedVideos = []; currentVideoId = null;
  setNavActive('nav-home');
  setSNavActive('snav-home');
}
function focusSearch() {
  const el = document.getElementById('search-mobile') || document.getElementById('search-sidebar');
  el?.focus();
  setNavActive('nav-search');
}
function setNavActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}
function setSNavActive(id) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  if (id) document.getElementById(id)?.classList.add('active');
}

// ── Skeleton ──────────────────────────────────────────────────────────────────
function showSkeleton(n = 16) {
  const cards = Array(n).fill(`
    <div class="sk-card">
      <div class="sk-thumb"></div>
      <div class="sk-body">
        <div class="sk-line w80"></div>
        <div class="sk-line w50"></div>
      </div>
    </div>`).join('');
  document.getElementById('content').innerHTML = `<div class="skeleton-grid">${cards}</div>`;
}

// ── Rendu cards ───────────────────────────────────────────────────────────────
function renderCards(videos, title) {
  const content = document.getElementById('content');
  if (!videos.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">Aucun résultat</div></div>`;
    return;
  }
  const cards = videos.map(v => `
    <div class="video-card" onclick="openVideo('${v.id}')">
      <div class="thumb-wrap">
        <img src="${v.thumbnail}" alt="" loading="lazy"
             onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
        <div class="thumb-gradient"></div>
        ${v.duration ? `<div class="duration-badge">${fmt(v.duration)}</div>` : ''}
        <div class="sb-badge">SB</div>
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(v.title)}</div>
        <div class="card-meta">
          <span>${escHtml(v.channel||'')}</span>
          ${v.views    ? `<span class="sep">·</span><span>${fmtViews(v.views)}</span>` : ''}
          ${v.published? `<span class="sep">·</span><span>${fmtDate(v.published)}</span>` : ''}
        </div>
      </div>
    </div>`).join('');
  content.innerHTML = `<div class="section-title">${title}</div><div class="video-grid">${cards}</div>`;
}

// ── Tendances ─────────────────────────────────────────────────────────────────
async function loadTrending() {
  setNavActive('nav-trending');
  setSNavActive('snav-trending');
  showSkeleton(20);
  try {
    const r = await fetch(`${API}/api/trending`);
    renderCards((await r.json()).results || [], 'Tendances');
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Erreur de connexion au backend</div></div>`;
  }
}

// ── Recherche ─────────────────────────────────────────────────────────────────
async function doSearch(q = '') {
  q = q.trim();
  if (!q) return;
  // Afficher home-view si on était sur le player
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player-view').classList.remove('active');
  setNavActive('nav-search');
  setSNavActive(null);
  showSkeleton(12);
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&limit=30`);
    renderCards((await r.json()).results || [], `Résultats pour « ${escHtml(q)} »`);
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur de connexion</div></div>`;
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
async function openVideo(videoId) {
  cancelAutoNext();
  currentVideoId = videoId;
  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('player-view').classList.add('active');
  document.getElementById('video-meta').innerHTML   = `<div class="loader"><div class="spinner"></div><span>Chargement…</span></div>`;
  document.getElementById('sb-panel').innerHTML      = '';
  document.getElementById('quality-bar').innerHTML   = '';
  document.getElementById('related-panel').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  try {
    const [infoRes, sbRes] = await Promise.all([
      fetch(`${API}/api/video/${videoId}`),
      fetch(`${API}/api/sponsorblock/${videoId}`)
    ]);
    const info   = await infoRes.json();
    const sbData = await sbRes.json();

    // Métadonnées
    const color   = channelColor(info.channel);
    const initial = (info.channel || '?').charAt(0).toUpperCase();
    document.getElementById('video-meta').innerHTML = `
      <div class="player-title">${escHtml(info.title)}</div>
      <div class="player-channel">
        <div class="channel-avatar" style="background:${color}22;color:${color}">${initial}</div>
        <div>
          <div class="channel-name">${escHtml(info.channel || '')}</div>
          <div class="channel-stats">
            ${fmtViews(info.views)}${info.published ? ' · ' + fmtDate(info.published) : ''}
          </div>
        </div>
      </div>
      ${info.description ? `<div class="player-desc">${escHtml(info.description)}</div>` : ''}
    `;

    // Sélecteur de qualité
    const qBar = document.getElementById('quality-bar');
    if (info.formats?.length) {
      qBar.innerHTML = `<span class="q-label">Qualité</span>`;
      info.formats.forEach((f, i) => {
        const btn = document.createElement('button');
        btn.className = 'q-btn' + (i === 0 ? ' active' : '');
        btn.textContent = f.quality ? `${f.quality}p` : f.format_id;
        btn.onclick = () => {
          document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadStream(videoId, f.quality || 720);
        };
        qBar.appendChild(btn);
      });
    }

    loadStream(videoId, info.formats?.[0]?.quality || 720);
    document.getElementById('player').addEventListener('ended', startAutoNext, { once: true });

    sbSegments = sbData.segments || [];
    renderSponsorBlock(sbSegments);
    startSBMonitor();
    loadRelated(videoId, info.title);

  } catch {
    document.getElementById('video-meta').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Impossible de charger la vidéo</div></div>`;
  }
}

function loadStream(videoId, quality) {
  const player    = document.getElementById('player');
  const savedTime = player.currentTime;
  player.src      = `${API}/api/stream/${videoId}?quality=${quality}`;
  if (savedTime > 0) {
    player.addEventListener('loadedmetadata', () => {
      player.currentTime = savedTime;
      player.play().catch(() => {});
    }, { once: true });
    player.load();
  } else {
    player.load();
    player.play().catch(() => {});
  }
}

// ── Raccourcis clavier ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!currentVideoId) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const p = document.getElementById('player');
  switch (e.key) {
    case ' ': case 'k':
      e.preventDefault();
      p.paused ? p.play() : p.pause();
      break;
    case 'ArrowLeft': case 'j':
      e.preventDefault();
      p.currentTime = Math.max(0, p.currentTime - 10);
      showToast('⏪  −10s');
      break;
    case 'ArrowRight': case 'l':
      e.preventDefault();
      p.currentTime = Math.min(p.duration || 0, p.currentTime + 10);
      showToast('⏩  +10s');
      break;
    case 'ArrowUp':
      e.preventDefault();
      p.volume = Math.min(1, +(p.volume + 0.1).toFixed(1));
      showToast(`🔊  ${Math.round(p.volume * 100)} %`);
      break;
    case 'ArrowDown':
      e.preventDefault();
      p.volume = Math.max(0, +(p.volume - 0.1).toFixed(1));
      showToast(`🔈  ${Math.round(p.volume * 100)} %`);
      break;
    case 'f':
      e.preventDefault();
      document.fullscreenElement ? document.exitFullscreen() : p.requestFullscreen?.();
      break;
    case 'm':
      e.preventDefault();
      p.muted = !p.muted;
      showToast(p.muted ? '🔇  Muet' : '🔊  Son activé');
      break;
  }
});

// ── SponsorBlock ──────────────────────────────────────────────────────────────
const SB_LABELS = {
  sponsor:'Sponsor', selfpromo:'Auto-promo', interaction:'Interaction',
  intro:'Intro', outro:'Outro', preview:'Aperçu',
  filler:'Remplissage', music_offtopic:'Hors-sujet'
};
function renderSponsorBlock(segs) {
  const panel = document.getElementById('sb-panel');
  if (!segs.length) {
    panel.innerHTML = `<div class="sb-panel"><div class="sb-panel-title">SponsorBlock</div><div style="font-size:12px;color:var(--text3)">Aucun segment pour cette vidéo</div></div>`;
    return;
  }
  panel.innerHTML = `
    <div class="sb-panel">
      <div class="sb-panel-title">SponsorBlock — ${segs.length} segment(s)</div>
      ${segs.map(s => `
        <div class="sb-segment">
          <span class="sb-cat">${SB_LABELS[s.category]||s.category}</span>
          <span style="font-family:'DM Mono',monospace;font-size:11px">${fmt(s.segment[0])} → ${fmt(s.segment[1])}</span>
        </div>`).join('')}
    </div>`;
}
function startSBMonitor() {
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  const p = document.getElementById('player');
  sbCheckInterval = setInterval(() => {
    if (!sbSegments.length || !sbActive) return;
    const t = p.currentTime;
    for (const seg of sbSegments) {
      const [start, end] = seg.segment;
      if (t >= start && t < end) {
        p.currentTime = end;
        showToast(`SponsorBlock : « ${SB_LABELS[seg.category]||seg.category} » sauté`);
        break;
      }
    }
  }, 500);
}

// ── Recommandations & Lecture suivante ────────────────────────────────────────
async function loadRelated(videoId, title = '') {
  const panel = document.getElementById('related-panel');
  panel.innerHTML = `<div class="loader"><div class="spinner"></div><span>Recommandations…</span></div>`;
  try {
    const qs = title ? `?q=${encodeURIComponent(title)}` : '';
    const data = await (await fetch(`${API}/api/related/${videoId}${qs}`)).json();
    relatedVideos = data.results || [];
    renderRelated(relatedVideos);
  } catch {
    relatedVideos = [];
    panel.innerHTML = '';
  }
}
function renderRelated(videos) {
  const panel = document.getElementById('related-panel');
  if (!videos.length) { panel.innerHTML = ''; return; }
  panel.innerHTML = `
    <div class="related-section-title">À regarder ensuite</div>
    ${videos.map(v => `
      <div class="related-card" onclick="openVideo('${v.id}')">
        <div class="related-thumb">
          <img src="${v.thumbnail}" loading="lazy" alt=""
               onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
          ${v.duration ? `<div class="duration-badge">${fmt(v.duration)}</div>` : ''}
        </div>
        <div class="related-info">
          <div class="related-title">${escHtml(v.title)}</div>
          <div class="related-meta">${escHtml(v.channel||'')}${v.views?` · ${fmtViews(v.views)}`:''}</div>
        </div>
      </div>`).join('')}
  `;
}
function startAutoNext() {
  if (!relatedVideos.length) return;
  const next = relatedVideos[0];
  document.getElementById('autonext-next-title').textContent = next.title;
  let count = 5;
  document.getElementById('autonext-count').textContent = count;
  document.getElementById('autonext-overlay').classList.remove('hidden');
  autoNextTimer = setInterval(() => {
    count--;
    document.getElementById('autonext-count').textContent = count;
    if (count <= 0) { cancelAutoNext(); openVideo(next.id); }
  }, 1000);
}
function cancelAutoNext() {
  if (autoNextTimer) { clearInterval(autoNextTimer); autoNextTimer = null; }
  document.getElementById('autonext-overlay')?.classList.add('hidden');
}

// ── Init ──────────────────────────────────────────────────────────────────────
showSkeleton(20);
loadTrending();
</script>
</body>
</html>
