<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MyTube">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>MyTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0f0f0f;
  --surface:     #212121;
  --surface2:    #272727;
  --surface3:    #3f3f3f;
  --border:      rgba(255,255,255,.1);
  --text:        #f1f1f1;
  --text2:       #aaaaaa;
  --text3:       #717171;
  --red:         #ff0000;
  --red-dark:    #cc0000;
  --header-h:    56px;
  --sidebar-mini: 72px;
  --sidebar-full: 240px;
  --safe-top:    env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; font-size: 14px; }
body { overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }

/* ══ SCROLLBAR ═══════════════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ══ HEADER ══════════════════════════════════════════════════════════════════ */
.yt-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h); background: var(--bg);
  display: flex; align-items: center; padding: 0 16px;
  gap: 8px;
}
.header-start { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.header-mid   { flex: 1; display: flex; justify-content: center; }
.header-end   { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Hamburger */
.hamburger-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: none; border: none; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.hamburger-btn:hover { background: var(--surface2); }
.hamburger-btn svg { width: 22px; height: 22px; }

/* Logo */
.yt-logo {
  display: flex; align-items: center; gap: 3px; padding: 4px 8px;
  font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text);
  text-decoration: none; border-radius: 4px; flex-shrink: 0;
}
.yt-logo-icon { color: var(--red); }
.yt-logo-sub  { font-size: 11px; font-weight: 500; color: var(--text3); margin-top: 7px; margin-left: 2px; }

/* Search bar */
.yt-search-form {
  display: flex; width: 100%; max-width: 600px;
}
.yt-search-input {
  flex: 1; background: var(--bg); border: 1px solid var(--surface3);
  border-right: none; color: var(--text); font-family: 'Roboto', sans-serif;
  font-size: 16px; padding: 8px 16px; border-radius: 40px 0 0 40px;
  outline: none; transition: border-color .2s;
  -webkit-appearance: none;
}
.yt-search-input:focus { border-color: #3ea6ff; background: var(--surface2); }
.yt-search-input::placeholder { color: var(--text3); }
.yt-search-btn {
  background: var(--surface2); border: 1px solid var(--surface3); color: var(--text2);
  padding: 0 20px; border-radius: 0 40px 40px 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; min-width: 64px;
}
.yt-search-btn:hover { background: var(--surface3); color: var(--text); }
.yt-search-btn svg { width: 20px; height: 20px; }

/* Auth header button */
.yt-signin-btn {
  display: flex; align-items: center; gap: 8px;
  background: none; border: 1px solid #3ea6ff; color: #3ea6ff;
  padding: 8px 14px; border-radius: 40px; font-size: 14px; font-weight: 500;
  transition: background .15s; white-space: nowrap;
}
.yt-signin-btn:hover { background: rgba(62,166,255,.1); }
.yt-signin-btn svg { width: 20px; height: 20px; }
.yt-user-btn {
  width: 34px; height: 34px; border-radius: 50%; overflow: hidden;
  background: var(--surface2); border: none; padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; flex-shrink: 0;
}
.yt-user-btn img { width: 100%; height: 100%; object-fit: cover; }

/* Icon-only button */
.yt-icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: none; border: none; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.yt-icon-btn:hover { background: var(--surface2); }
.yt-icon-btn svg { width: 22px; height: 22px; }

/* ══ SIDEBAR ═════════════════════════════════════════════════════════════════ */
.yt-sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-mini); background: var(--bg);
  display: flex; flex-direction: column; z-index: 90;
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none; transition: width .2s ease;
}
.yt-sidebar::-webkit-scrollbar { display: none; }
.yt-sidebar.full { width: var(--sidebar-full); }

.sidebar-section { padding: 8px 0; border-bottom: 1px solid var(--border); }
.sidebar-section:last-child { border-bottom: none; }

.sidebar-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 14px 0;
  background: none; border: none; color: var(--text2);
  width: 100%; text-align: center; transition: background .15s, color .15s;
  cursor: pointer; font-family: 'Roboto', sans-serif; position: relative;
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active { color: var(--text); }
.sidebar-item.active .sidebar-item-icon-wrap {
  background: var(--surface3); border-radius: 8px;
}
.sidebar-item-icon-wrap {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: background .15s; flex-shrink: 0;
}
.sidebar-item svg { width: 22px; height: 22px; }
.sidebar-label {
  font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 64px;
}

/* Full sidebar mode — horizontal layout */
.yt-sidebar.full .sidebar-item {
  flex-direction: row; gap: 16px;
  padding: 10px 16px; text-align: left;
}
.yt-sidebar.full .sidebar-item-icon-wrap { flex-shrink: 0; }
.yt-sidebar.full .sidebar-label { font-size: 14px; font-weight: 400; max-width: none; overflow: visible; }

/* Subscriptions in full sidebar */
.sidebar-sub-item {
  display: none; align-items: center; gap: 16px;
  padding: 8px 16px; background: none; border: none;
  color: var(--text2); width: 100%; text-align: left;
  font-family: 'Roboto', sans-serif; font-size: 14px; cursor: pointer;
  transition: background .15s;
}
.yt-sidebar.full .sidebar-sub-item { display: flex; }
.sidebar-sub-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-sub-thumb {
  width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
  background: var(--surface3);
}
.sidebar-sub-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.subs-section-title {
  display: none; font-size: 14px; font-weight: 500; color: var(--text);
  padding: 12px 16px 4px;
}
.yt-sidebar.full .subs-section-title { display: block; }

/* ══ MAIN CONTENT ════════════════════════════════════════════════════════════ */
.yt-main {
  margin-top: var(--header-h); margin-left: var(--sidebar-mini);
  min-height: calc(100vh - var(--header-h));
  transition: margin-left .2s ease;
}
.yt-main.sidebar-full { margin-left: var(--sidebar-full); }

.yt-content { padding: 24px; max-width: 1800px; margin: 0 auto; }

/* ══ VIDEO GRID ══════════════════════════════════════════════════════════════ */
.yt-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px 12px;
  margin-top: 16px;
}
@media (max-width: 600px) {
  .yt-grid { grid-template-columns: 1fr 1fr; gap: 8px 6px; }
}

.feed-title {
  font-size: 16px; font-weight: 500; color: var(--text);
  padding-bottom: 8px;
}

/* ══ VIDEO CARD ══════════════════════════════════════════════════════════════ */
.yt-card { cursor: pointer; }
.yt-card:active { opacity: .85; }

.yt-thumb-wrap {
  position: relative; aspect-ratio: 16/9; border-radius: 12px;
  overflow: hidden; background: var(--surface2); margin-bottom: 12px;
}
.yt-thumb-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: border-radius .2s;
}
.yt-card:hover .yt-thumb-wrap img { border-radius: 0; }
.yt-duration {
  position: absolute; bottom: 6px; right: 6px;
  background: rgba(0,0,0,.9); color: #fff;
  font-family: 'Roboto Mono', monospace; font-size: 12px; font-weight: 500;
  padding: 1px 5px; border-radius: 4px;
}

.yt-card-details { display: flex; gap: 12px; }
.yt-card-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff; margin-top: 2px;
}
.yt-card-text { flex: 1; min-width: 0; }
.yt-card-title {
  font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 4px;
}
.yt-card-channel { font-size: 13px; color: var(--text2); margin-bottom: 2px; }
.yt-card-meta    { font-size: 13px; color: var(--text2); }

/* ══ SKELETON ════════════════════════════════════════════════════════════════ */
.yt-sk-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px 12px; margin-top: 16px;
}
@media (max-width: 600px) { .yt-sk-grid { grid-template-columns: 1fr 1fr; gap: 8px 6px; } }
.yt-sk-thumb {
  aspect-ratio: 16/9; border-radius: 12px;
  animation: sk 1.4s ease-in-out infinite; margin-bottom: 12px;
}
.yt-sk-details { display: flex; gap: 12px; }
.yt-sk-avatar  { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; animation: sk 1.4s ease-in-out infinite; }
.yt-sk-lines  { flex: 1; }
.yt-sk-line   { border-radius: 4px; height: 12px; margin-bottom: 8px; animation: sk 1.4s ease-in-out infinite; }
.yt-sk-line.w80 { width: 80%; }
.yt-sk-line.w55 { width: 55%; }
.yt-sk-line.w40 { width: 40%; }
@keyframes sk {
  0%,100% { background: var(--surface2); }
  50%      { background: var(--surface3); }
}

/* ══ CONTINUE WATCHING ═══════════════════════════════════════════════════════ */
.continue-section { margin-bottom: 8px; }
.continue-label {
  font-size: 16px; font-weight: 500; color: var(--text);
  margin-bottom: 12px;
}
.continue-row {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: var(--surface3) transparent;
}
.continue-card {
  flex-shrink: 0; width: 200px; cursor: pointer; border-radius: 10px;
  overflow: hidden; transition: opacity .15s;
}
.continue-card:hover { opacity: .85; }
.continue-thumb { position: relative; aspect-ratio: 16/9; background: var(--surface2); border-radius: 10px; overflow: hidden; }
.continue-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.continue-progress-bar {
  position: absolute; bottom: 0; left: 0; height: 3px;
  background: var(--red); pointer-events: none;
}
.continue-info { padding: 6px 2px; }
.continue-title {
  font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 2px;
}
.continue-meta { font-size: 12px; color: var(--text2); }

/* ══ STATES ══════════════════════════════════════════════════════════════════ */
.loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px; gap: 14px;
  color: var(--text3); font-size: 14px;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--surface3);
  border-top-color: var(--red); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-icon { font-size: 56px; margin-bottom: 16px; opacity: .25; }
.empty-text { font-size: 16px; }

/* ══ PLAYER VIEW ═════════════════════════════════════════════════════════════ */
#player-view  { display: none; }
#player-view.active { display: block; }
#home-view.hidden   { display: none; }

.player-back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: none; border: none; color: var(--text2);
  font-size: 14px; font-weight: 500; padding: 8px 0; margin-bottom: 12px;
  cursor: pointer; transition: color .15s;
}
.player-back-btn:hover { color: var(--text); }
.player-back-btn svg { width: 20px; height: 20px; }

.player-layout {
  display: flex; gap: 24px; align-items: flex-start;
}
.player-main   { flex: 1; min-width: 0; }
.player-sidebar {
  width: 402px; flex-shrink: 0;
}
@media (max-width: 1200px) {
  .player-layout { flex-direction: column; }
  .player-sidebar { width: 100%; }
}

.player-video-wrap {
  background: #000; border-radius: 12px; overflow: hidden;
  position: relative; margin-bottom: 14px;
}
video { width: 100%; display: block; max-height: 65vh; background: #000; }

/* Video meta */
.player-title { font-size: 20px; font-weight: 600; line-height: 1.3; margin-bottom: 12px; color: var(--text); }
.player-meta-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.player-avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700; color: #fff;
}
.player-ch-name  { font-size: 15px; font-weight: 500; color: var(--text); }
.player-ch-stats { font-size: 13px; color: var(--text2); }
.player-desc {
  font-size: 14px; color: var(--text2); line-height: 1.6; margin-top: 6px;
  cursor: pointer; display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden; transition: all .2s;
}
.player-desc.expanded { -webkit-line-clamp: unset; display: block; }

/* Quality + PiP bar */
.yt-quality-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px; padding: 10px 14px;
  background: var(--surface2); border-radius: 10px;
}
.q-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-right: 2px; }
.q-btn {
  background: var(--surface3); border: none; color: var(--text2);
  font-size: 13px; font-family: 'Roboto Mono', monospace;
  padding: 5px 12px; border-radius: 18px; cursor: pointer; transition: all .15s;
}
.q-btn.active { background: var(--text); color: var(--bg); font-weight: 600; }
.q-btn:hover:not(.active) { background: var(--surface3); color: var(--text); }
.pip-btn {
  margin-left: auto; background: none; border: 1px solid var(--surface3);
  color: var(--text2); font-size: 13px; padding: 5px 12px; border-radius: 18px;
  cursor: pointer; transition: all .15s; display: none; align-items: center; gap: 6px;
  font-family: 'Roboto', sans-serif; font-weight: 500;
}
.pip-btn:hover { background: var(--surface3); color: var(--text); }
.pip-btn.active { border-color: #3ea6ff; color: #3ea6ff; }
.pip-btn svg { width: 15px; height: 15px; }

/* SponsorBlock */
.sb-panel {
  background: var(--surface2); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 12px;
}
.sb-panel-title {
  font-size: 11px; font-weight: 700; color: #00c864;
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 8px;
}
.sb-segment {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--text2); padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.sb-segment:last-child { border-bottom: none; }
.sb-cat { color: var(--text); font-weight: 500; }

/* ══ RELATED PANEL ═══════════════════════════════════════════════════════════ */
.related-title-label {
  font-size: 16px; font-weight: 500; color: var(--text);
  margin-bottom: 12px;
}
.yt-related-card {
  display: flex; gap: 8px; cursor: pointer;
  padding: 8px; border-radius: 10px; margin-bottom: 2px;
  transition: background .15s;
}
.yt-related-card:hover { background: var(--surface2); }
.yt-related-thumb {
  position: relative; width: 168px; flex-shrink: 0;
  aspect-ratio: 16/9; border-radius: 8px; overflow: hidden;
  background: var(--surface2);
}
.yt-related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.yt-related-dur {
  position: absolute; bottom: 4px; right: 4px;
  background: rgba(0,0,0,.9); color: #fff;
  font-family: 'Roboto Mono', monospace; font-size: 11px;
  padding: 1px 4px; border-radius: 3px;
}
.yt-related-text { flex: 1; min-width: 0; }
.yt-related-title {
  font-size: 14px; font-weight: 500; line-height: 1.3; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 4px;
}
.yt-related-channel { font-size: 13px; color: var(--text2); }
.yt-related-meta    { font-size: 13px; color: var(--text2); }
@media (max-width: 600px) { .yt-related-thumb { width: 130px; } }

/* ══ AUTO-NEXT ═══════════════════════════════════════════════════════════════ */
.autonext-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.88); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 10; border-radius: 12px;
}
.autonext-overlay.hidden { display: none; }
.autonext-content { text-align: center; padding: 24px; max-width: 320px; }
.autonext-label {
  font-size: 11px; font-weight: 700; color: var(--text2);
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px;
}
.autonext-countdown {
  font-size: 72px; font-weight: 700; color: var(--red);
  font-family: 'Roboto Mono', monospace; line-height: 1; margin-bottom: 12px;
}
.autonext-next-title {
  font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 20px;
}
.autonext-cancel-btn {
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  color: var(--text); font-family: 'Roboto', sans-serif;
  font-size: 14px; font-weight: 500; padding: 10px 24px; border-radius: 40px;
  cursor: pointer; transition: background .2s;
}
.autonext-cancel-btn:hover { background: rgba(255,255,255,.25); }

/* ══ BOTTOM NAV (mobile only) ════════════════════════════════════════════════ */
.yt-bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
}
.yt-nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 10px 0; color: var(--text3);
  background: none; border: none; font-size: 10px; font-weight: 500;
  font-family: 'Roboto', sans-serif; letter-spacing: .01em; transition: color .15s;
}
.yt-nav-btn.active { color: var(--text); }
.yt-nav-btn svg { width: 22px; height: 22px; }

/* ══ USER MENU DROPDOWN ══════════════════════════════════════════════════════ */
.user-menu-wrap { position: relative; }
.user-menu-popup {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--surface2); border: 1px solid var(--surface3);
  border-radius: 12px; overflow: hidden; z-index: 200;
  min-width: 200px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  display: none;
}
.user-menu-popup.open { display: block; }
.user-menu-header { padding: 16px; border-bottom: 1px solid var(--border); }
.user-menu-name  { font-size: 14px; font-weight: 500; color: var(--text); }
.user-menu-email { font-size: 12px; color: var(--text2); }
.user-menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; cursor: pointer; font-size: 14px; color: var(--text2);
  background: none; border: none; width: 100%; font-family: 'Roboto', sans-serif;
  text-align: left; transition: background .15s;
}
.user-menu-item:hover { background: var(--surface3); color: var(--text); }
.user-menu-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.user-menu-item.danger { color: #ff6b6b; }

/* ══ AUTH MODAL ══════════════════════════════════════════════════════════════ */
.auth-modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); padding: 20px;
}
.auth-modal-backdrop.open { display: flex; }
.auth-modal {
  background: #282828; border: 1px solid var(--surface3);
  border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 420px;
  text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,.7);
}
.auth-modal h3 { font-size: 22px; font-weight: 400; margin-bottom: 8px; }
.auth-modal .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }
.device-code-box {
  background: var(--surface3); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 20px;
}
.device-code-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.device-code {
  font-family: 'Roboto Mono', monospace; font-size: 34px; font-weight: 700;
  color: var(--text); letter-spacing: .1em; margin-bottom: 14px;
}
.device-url-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: #3ea6ff; color: #0f0f0f; border: none; cursor: pointer;
  font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 500;
  padding: 10px 22px; border-radius: 40px; text-decoration: none; transition: opacity .15s;
}
.device-url-btn:hover { opacity: .9; }
.auth-step {
  display: flex; align-items: flex-start; gap: 12px;
  text-align: left; margin-bottom: 10px;
}
.auth-step-num {
  width: 22px; height: 22px; border-radius: 50%; background: #3ea6ff;
  color: #0f0f0f; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.auth-step-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
.auth-step-text strong { color: var(--text); }
.auth-waiting {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 13px; color: var(--text3); margin-top: 20px;
}
.auth-modal-close {
  background: none; border: none; color: var(--text3); font-family: 'Roboto', sans-serif;
  font-size: 13px; cursor: pointer; padding: 8px; margin-top: 12px; display: block; width: 100%;
}

/* ══ AUTH SHEET (mobile) ═════════════════════════════════════════════════════ */
.auth-sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 300;
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(6px);
}
.auth-sheet-backdrop.open { display: flex; }
.auth-sheet {
  background: #282828; border: 1px solid var(--surface3);
  border-radius: 20px 20px 0 0; padding: 24px 24px calc(24px + var(--safe-bottom));
  width: 100%; max-width: 500px; text-align: center;
}
.auth-sheet h3 { font-size: 18px; font-weight: 400; margin-bottom: 8px; }
.auth-sheet p  { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
.auth-btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; max-width: 280px; margin: 0 auto 12px;
  padding: 10px 18px; border-radius: 40px;
  background: none; border: 1px solid #3ea6ff; color: #3ea6ff;
  font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background .15s;
}
.auth-btn-primary:hover { background: rgba(62,166,255,.1); }
.auth-btn-primary svg { width: 18px; height: 18px; }
.auth-sheet-close {
  background: none; border: none; color: var(--text3); font-family: 'Roboto', sans-serif;
  font-size: 14px; cursor: pointer; padding: 8px; margin-top: 4px;
}

/* ══ TOAST ═══════════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #e8e8e8; color: #0f0f0f;
  font-size: 14px; font-weight: 500; padding: 10px 22px; border-radius: 40px;
  opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; white-space: nowrap; z-index: 400;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ RESPONSIVE ══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .yt-sidebar   { display: none !important; }
  .yt-main      { margin-left: 0 !important; padding-bottom: calc(56px + var(--safe-bottom)); }
  .yt-bottom-nav { display: flex; }

  .header-mid .yt-search-form { display: none; }
  .player-title { font-size: 16px; }
}
@media (min-width: 769px) {
  body { padding-bottom: 0; }
}
</style>

  <div class="auth-sheet" id="auth-sheet"></div>

<div class="toast" id="toast"></div>

<script>
const API = '';

// ── État ──────────────────────────────────────────────────────────────────────
let currentVideoId   = null;
let currentVideoMeta = {};
let sbSegments       = [];
let sbActive         = true;
let sbCheckInterval  = null;
let relatedVideos    = [];
let autoNextTimer    = null;
let authState        = { authenticated: false, user: null };
let sidebarFull      = false;

// ── Utilitaires ───────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s) return '';
  s = Math.round(s);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtViews(n) {
  if (!n) return '';
  if (n >= 1e9) return `${(n/1e9).toFixed(1)}G vues`;
  if (n >= 1e6) return `${(n/1e6).toFixed(1)}M vues`;
  if (n >= 1e3) return `${(n/1e3).toFixed(0)}K vues`;
  return `${n} vues`;
}
function fmtDate(s) {
  if (!s || s.length < 8) return '';
  return `${s.slice(6,8)}/${s.slice(4,6)}/${s.slice(0,4)}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}
function channelColor(name) {
  const p = ['#c0392b','#e67e22','#f39c12','#27ae60','#16a085','#2980b9','#8e44ad','#d35400','#1abc9c','#e74c3c'];
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return p[Math.abs(h) % p.length];
}

// ── Sidebar toggle ────────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarFull = !sidebarFull;
  document.getElementById('yt-sidebar').classList.toggle('full', sidebarFull);
  document.getElementById('yt-main').classList.toggle('sidebar-full', sidebarFull);
}

// ── Mobile search ─────────────────────────────────────────────────────────────
function toggleMobileSearch() {
  const bar = document.getElementById('mobile-search-bar');
  const showing = bar.style.display !== 'none';
  bar.style.display = showing ? 'none' : 'block';
  if (!showing) document.getElementById('mobile-search-input').focus();
}
function hideMobileSearch() {
  document.getElementById('mobile-search-bar').style.display = 'none';
}

// Fix: show mobile search button on small screens
(function() {
  if (window.innerWidth <= 768) {
    document.getElementById('mobile-search-btn').style.display = 'flex';
  }
  window.addEventListener('resize', () => {
    document.getElementById('mobile-search-btn').style.display =
      window.innerWidth <= 768 ? 'flex' : 'none';
  });
})();

// ── Watch History ─────────────────────────────────────────────────────────────
const HISTORY_KEY = 'mytube_history_v2';
const MAX_HISTORY = 200;

function getHistory()       { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); } catch { return []; } }
function saveHistory(arr)   { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); } catch {} }
function saveProgress(videoId, title, thumbnail, channel, duration, currentTime) {
  if (!videoId || duration < 10) return;
  const pct = currentTime / duration;
  if (pct < 0.05) return;
  const hist = getHistory().filter(h => h.id !== videoId);
  hist.unshift({ id:videoId, title, thumbnail, channel, duration,
    currentTime: pct > 0.95 ? 0 : currentTime,
    pct: pct > 0.95 ? 1 : pct, ts: Date.now() });
  saveHistory(hist.slice(0, MAX_HISTORY));
}
function getContinueWatching() { return getHistory().filter(h => h.pct > 0.05 && h.pct < 0.95).slice(0,10); }
function getWatchedHistory()   { return getHistory().slice(0, 60); }

// ── Auth — Device Code Flow ───────────────────────────────────────────────────
let _pollInterval = null, _pollId = null, _pollIntervalS = 5;

async function initAuth() {
  try { authState = await (await fetch(`${API}/auth/status`)).json(); }
  catch { authState = { authenticated: false, user: null }; }
  renderHeaderAuth();
  if (authState.authenticated) loadSubscriptions();
}

function renderHeaderAuth() {
  const el = document.getElementById('header-auth');
  if (authState.authenticated) {
    const u = authState.user;
    const color = channelColor(u.name);
    const avatarHtml = u.picture
      ? `<img src="${escHtml(u.picture)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : `<div style="width:100%;height:100%;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff">${(u.name||'?').charAt(0).toUpperCase()}</div>`;
    el.innerHTML = `
      <button class="yt-user-btn" onclick="toggleHeaderUserMenu()">${avatarHtml}</button>
      <div class="user-menu-popup" id="user-menu-popup">
        <div class="user-menu-header">
          <div class="user-menu-name">${escHtml(u.name||'')}</div>
          <div class="user-menu-email">${escHtml(u.email||'')}</div>
        </div>
        <button class="user-menu-item" onclick="showPersonalFeed();closeHeaderUserMenu()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Mon fil
        </button>
        <button class="user-menu-item danger" onclick="doLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Se déconnecter
        </button>
      </div>`;
  } else {
    el.innerHTML = `
      <button class="yt-signin-btn" onclick="startDeviceLogin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Se connecter
      </button>`;
  }
}

function toggleHeaderUserMenu() {
  document.getElementById('user-menu-popup')?.classList.toggle('open');
}
function closeHeaderUserMenu() {
  document.getElementById('user-menu-popup')?.classList.remove('open');
}
document.addEventListener('click', e => {
  const p = document.getElementById('user-menu-popup');
  if (p?.classList.contains('open') && !e.target.closest('.user-menu-wrap')) p.classList.remove('open');
});

async function doLogout() {
  await fetch(`${API}/auth/logout`, { method: 'POST' });
  authState = { authenticated: false, user: null };
  renderHeaderAuth();
  document.getElementById('subs-section').style.display = 'none';
  document.getElementById('subs-list').innerHTML = '';
  closeHeaderUserMenu();
  closeAuthSheet();
  closeAuthModal();
  showToast('Déconnecté');
}

// ── Device code ───────────────────────────────────────────────────────────────
async function startDeviceLogin() {
  closeHeaderUserMenu();
  const modal = document.getElementById('auth-modal');
  document.getElementById('auth-modal-backdrop').classList.add('open');
  modal.innerHTML = `<div class="loader" style="padding:32px 0"><div class="spinner"></div><span>Connexion à Google…</span></div>`;
  let data;
  try {
    data = await (await fetch(`${API}/auth/device/start`)).json();
    if (!data.poll_id) throw new Error(data.detail||'Erreur');
  } catch(e) {
    modal.innerHTML = `<h3>Erreur</h3><p class="subtitle">${escHtml(String(e))}</p><button class="auth-modal-close" onclick="closeAuthModal()">Fermer</button>`;
    return;
  }
  _pollId = data.poll_id; _pollIntervalS = data.interval||5;
  modal.innerHTML = `
    <h3>Connexion Google</h3>
    <p class="subtitle">Entrez ce code sur google.com/device</p>
    <div class="device-code-box">
      <div class="device-code-label">Votre code</div>
      <div class="device-code">${escHtml(data.user_code)}</div>
      <a class="device-url-btn" href="${escHtml(data.verification_url)}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ouvrir google.com/device
      </a>
    </div>
    <div class="auth-step"><div class="auth-step-num">1</div><div class="auth-step-text">Ouvrez <strong>google.com/device</strong></div></div>
    <div class="auth-step"><div class="auth-step-num">2</div><div class="auth-step-text">Entrez <strong>${escHtml(data.user_code)}</strong> et connectez-vous</div></div>
    <div class="auth-step"><div class="auth-step-num">3</div><div class="auth-step-text">Cette fenêtre se ferme automatiquement</div></div>
    <div class="auth-waiting"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div>En attente…</div>
    <button class="auth-modal-close" onclick="cancelDeviceLogin()">Annuler</button>`;
  stopDevicePoll();
  _pollInterval = setInterval(pollDeviceCode, _pollIntervalS * 1000);
}
async function pollDeviceCode() {
  if (!_pollId) return;
  try {
    const d = await (await fetch(`${API}/auth/device/poll?poll_id=${_pollId}`)).json();
    if (d.status === 'authorized') {
      stopDevicePoll(); authState = { authenticated: true, user: d.user };
      closeAuthModal(); closeAuthSheet();
      renderHeaderAuth(); loadSubscriptions();
      showToast(`Connecté — ${d.user?.name||'Google'}`);
      showPersonalFeed();
    } else if (d.status === 'expired' || d.status === 'error') {
      stopDevicePoll();
      document.getElementById('auth-modal').innerHTML = `
        <h3>${d.status==='expired'?'Code expiré':'Erreur'}</h3>
        <p class="subtitle">${d.status==='expired'?'Le code a expiré.':escHtml(d.message||'')}</p>
        <button class="auth-btn-primary" onclick="startDeviceLogin()" style="margin:0 auto 12px">Réessayer</button>
        <button class="auth-modal-close" onclick="closeAuthModal()">Annuler</button>`;
    }
  } catch {}
}
function stopDevicePoll()    { if (_pollInterval) { clearInterval(_pollInterval); _pollInterval=null; } _pollId=null; }
function cancelDeviceLogin() { stopDevicePoll(); closeAuthModal(); }
function closeAuthModal()    { document.getElementById('auth-modal-backdrop').classList.remove('open'); }

function toggleMobileAuthSheet() {
  const b = document.getElementById('auth-sheet-backdrop');
  if (b.classList.contains('open')) { closeAuthSheet(); return; }
  const s = document.getElementById('auth-sheet');
  if (authState.authenticated) {
    const u = authState.user;
    const color = channelColor(u.name);
    const av = u.picture
      ? `<img src="${escHtml(u.picture)}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block" alt="">`
      : `<div style="width:56px;height:56px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;margin:0 auto 12px">${(u.name||'?').charAt(0).toUpperCase()}</div>`;
    s.innerHTML = `${av}<h3>${escHtml(u.name||'')}</h3><p>${escHtml(u.email||'')}</p>
      <button class="auth-btn-primary" onclick="showPersonalFeed();closeAuthSheet()">Mon fil personnalisé</button>
      <button class="auth-btn-primary" style="border-color:#ff6b6b;color:#ff6b6b;margin-top:4px" onclick="doLogout()">Se déconnecter</button>`;
  } else {
    s.innerHTML = `<h3>Connexion</h3><p>Connectez votre compte Google pour accéder à votre fil et vos abonnements.</p>
      <button class="auth-btn-primary" onclick="closeAuthSheet();startDeviceLogin()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Se connecter avec Google
      </button>
      <button class="auth-sheet-close" onclick="closeAuthSheet()">Fermer</button>`;
  }
  b.classList.add('open');
}
function closeAuthSheet() { document.getElementById('auth-sheet-backdrop').classList.remove('open'); }

// ── Abonnements ───────────────────────────────────────────────────────────────
async function loadSubscriptions() {
  try {
    const r = await fetch(`${API}/api/subscriptions`);
    if (!r.ok) return;
    const subs = (await r.json()).subscriptions || [];
    if (!subs.length) return;
    const section = document.getElementById('subs-section');
    const list    = document.getElementById('subs-list');
    section.style.display = 'block';
    list.innerHTML = subs.slice(0,20).map(s => `
      <button class="sidebar-sub-item" onclick="openChannel('${escHtml(s.id)}','${escHtml(s.title)}')">
        ${s.thumbnail
          ? `<img class="sidebar-sub-thumb" src="${escHtml(s.thumbnail)}" alt="">`
          : `<div class="sidebar-sub-thumb" style="background:${channelColor(s.title)};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${(s.title||'?').charAt(0).toUpperCase()}</div>`}
        <span class="sidebar-sub-name">${escHtml(s.title)}</span>
      </button>`).join('');
  } catch {}
}
async function openChannel(channelId, channelName) {
  setSNavActive(null);
  showSkeleton(12);
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player-view').classList.remove('active');
  try {
    const data = await (await fetch(`${API}/api/channel/${channelId}`)).json();
    renderCards(data.results||[], channelName||'Chaîne');
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Impossible de charger la chaîne</div></div>`;
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showHome() {
  document.getElementById('player-view').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  const player = document.getElementById('player');
  player.pause(); player.src = '';
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  cancelAutoNext();
  sbSegments=[]; relatedVideos=[]; currentVideoId=null; currentVideoMeta={};
  document.title = 'MyTube';
  setNavActive('nav-home'); setSNavActive('snav-home');
  renderContinueWatching();
  authState.authenticated ? showPersonalFeed() : loadTrending();
}
async function showPersonalFeed() {
  setSNavActive('snav-home');
  showSkeleton(20);
  try {
    const r = await fetch(`${API}/api/feed`);
    if (!r.ok) throw new Error();
    renderCards((await r.json()).results||[], 'Pour vous');
  } catch { loadTrending(); }
}
function showHistory() {
  setNavActive('nav-history'); setSNavActive('snav-history');
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player-view').classList.remove('active');
  const hist = getWatchedHistory();
  if (!hist.length) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">🕐</div><div class="empty-text">Aucun historique de visionnage</div></div>`;
    return;
  }
  renderCards(hist.map(h=>({id:h.id,title:h.title,thumbnail:h.thumbnail,channel:h.channel,duration:h.duration})), 'Historique');
}
function setNavActive(id) {
  document.querySelectorAll('.yt-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}
function setSNavActive(id) {
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  if (id) document.getElementById(id)?.classList.add('active');
}

// ── Continuer à regarder ──────────────────────────────────────────────────────
function renderContinueWatching() {
  const cont = getContinueWatching();
  const section = document.getElementById('continue-section');
  const row     = document.getElementById('continue-row');
  if (!cont.length) { section.style.display='none'; return; }
  section.style.display = 'block';
  row.innerHTML = cont.map(h=>`
    <div class="continue-card" onclick="openVideo('${h.id}',${h.currentTime||0})">
      <div class="continue-thumb">
        <img src="${escHtml(h.thumbnail||'')}" alt="" loading="lazy"
             onerror="this.src='https://i.ytimg.com/vi/${h.id}/hqdefault.jpg'">
        <div class="continue-progress-bar" style="width:${Math.round((h.pct||0)*100)}%"></div>
      </div>
      <div class="continue-info">
        <div class="continue-title">${escHtml(h.title||'')}</div>
        <div class="continue-meta">${escHtml(h.channel||'')}${h.duration?' · '+fmt(h.duration):''}</div>
      </div>
    </div>`).join('');
}

// ── Skeleton ──────────────────────────────────────────────────────────────────
function showSkeleton(n=16) {
  const cards = Array(n).fill(`
    <div>
      <div class="yt-sk-thumb"></div>
      <div class="yt-sk-details">
        <div class="yt-sk-avatar"></div>
        <div class="yt-sk-lines">
          <div class="yt-sk-line w80"></div>
          <div class="yt-sk-line w55"></div>
          <div class="yt-sk-line w40"></div>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('content').innerHTML = `<div class="yt-sk-grid">${cards}</div>`;
}

// ── Rendu grille ──────────────────────────────────────────────────────────────
function renderCards(videos, title) {
  const content = document.getElementById('content');
  if (!videos.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">Aucun résultat</div></div>`;
    return;
  }
  const titleHtml = title ? `<h2 class="feed-title">${escHtml(title)}</h2>` : '';
  const cards = videos.map(v => {
    const color   = channelColor(v.channel);
    const initial = (v.channel||'?').charAt(0).toUpperCase();
    const meta    = [fmtViews(v.views), v.published?fmtDate(v.published):''].filter(Boolean).join(' · ');
    return `
      <div class="yt-card" onclick="openVideo('${v.id}')">
        <div class="yt-thumb-wrap">
          <img src="${escHtml(v.thumbnail||'')}" alt="" loading="lazy"
               onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
          ${v.duration?`<span class="yt-duration">${fmt(v.duration)}</span>`:''}
        </div>
        <div class="yt-card-details">
          <div class="yt-card-avatar" style="background:${color}">${initial}</div>
          <div class="yt-card-text">
            <div class="yt-card-title">${escHtml(v.title)}</div>
            <div class="yt-card-channel">${escHtml(v.channel||'')}</div>
            ${meta?`<div class="yt-card-meta">${meta}</div>`:''}
          </div>
        </div>
      </div>`;
  }).join('');
  content.innerHTML = `${titleHtml}<div class="yt-grid">${cards}</div>`;
}

// ── Tendances ─────────────────────────────────────────────────────────────────
async function loadTrending() {
  setNavActive('nav-trending'); setSNavActive('snav-trending');
  showSkeleton(20);
  try {
    renderCards((await (await fetch(`${API}/api/trending`)).json()).results||[], 'Tendances');
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Erreur de connexion</div></div>`;
  }
}

// ── Recherche ─────────────────────────────────────────────────────────────────
async function doSearch(q='') {
  q = q.trim(); if (!q) return;
  hideMobileSearch();
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player-view').classList.remove('active');
  setNavActive('nav-search'); setSNavActive(null);
  showSkeleton(12);
  try {
    renderCards((await (await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&limit=30`)).json()).results||[], `Résultats : ${q}`);
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur de connexion</div></div>`;
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
async function openVideo(videoId, resumeAt=0) {
  cancelAutoNext();
  currentVideoId = videoId;
  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('player-view').classList.add('active');
  document.getElementById('video-meta').innerHTML   = `<div class="loader"><div class="spinner"></div><span>Chargement…</span></div>`;
  document.getElementById('sb-panel').innerHTML      = '';
  document.getElementById('quality-bar').innerHTML   = `<button class="pip-btn" id="pip-btn" onclick="togglePiP()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><rect x="12" y="11" width="8" height="6" rx="1" fill="currentColor" stroke="none"/></svg>PiP</button>`;
  document.getElementById('related-panel').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  try {
    const [infoRes, sbRes] = await Promise.all([
      fetch(`${API}/api/video/${videoId}`),
      fetch(`${API}/api/sponsorblock/${videoId}`)
    ]);
    const info   = await infoRes.json();
    const sbData = await sbRes.json();
    currentVideoMeta = { id:videoId, title:info.title, thumbnail:info.thumbnail, channel:info.channel, duration:info.duration };
    if (!resumeAt) {
      const h = getHistory().find(h=>h.id===videoId);
      if (h && h.currentTime>10) resumeAt = h.currentTime;
    }
    const color   = channelColor(info.channel);
    const initial = (info.channel||'?').charAt(0).toUpperCase();
    document.getElementById('video-meta').innerHTML = `
      <div class="player-title">${escHtml(info.title)}</div>
      <div class="player-meta-row">
        <div class="player-avatar" style="background:${color}">${initial}</div>
        <div>
          <div class="player-ch-name">${escHtml(info.channel||'')}</div>
          <div class="player-ch-stats">${fmtViews(info.views)}${info.published?' · '+fmtDate(info.published):''}</div>
        </div>
      </div>
      ${info.description?`<div class="player-desc" onclick="this.classList.toggle('expanded')">${escHtml(info.description)}</div>`:''}`;
    const qBar = document.getElementById('quality-bar');
    if (info.formats?.length) {
      const pipBtn = qBar.querySelector('.pip-btn');
      const label = document.createElement('span'); label.className='q-label'; label.textContent='Qualité';
      qBar.insertBefore(label, pipBtn);
      info.formats.forEach((f,i)=>{
        const btn = document.createElement('button'); btn.className='q-btn'+(i===0?' active':'');
        btn.textContent = f.quality?`${f.quality}p`:f.format_id;
        btn.onclick = ()=>{ document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); loadStream(videoId,f.quality||720); };
        qBar.insertBefore(btn, pipBtn);
      });
    }
    loadStream(videoId, info.formats?.[0]?.quality||720, resumeAt);
    document.getElementById('player').addEventListener('ended', startAutoNext, { once:true });
    sbSegments = sbData.segments||[];
    renderSponsorBlock(sbSegments);
    startSBMonitor();
    loadRelated(videoId, info.title);
    startProgressTracking();
    // Titre visible dans la fenêtre PiP et l'onglet
    document.title = info.title ? `${info.title} — MyTube` : 'MyTube';
    document.getElementById('player').title = info.title || '';

    initPiP();
    setupMediaSession(info.title, info.channel, info.thumbnail);
  } catch {
    document.getElementById('video-meta').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Impossible de charger la vidéo</div></div>`;
  }
}

function loadStream(videoId, quality, resumeAt=0) {
  const player    = document.getElementById('player');
  const savedTime = resumeAt || player.currentTime;
  player.src      = `${API}/api/stream/${videoId}?quality=${quality}`;
  if (savedTime > 0) {
    player.addEventListener('loadedmetadata', ()=>{ player.currentTime=savedTime; player.play().catch(()=>{}); }, {once:true});
    player.load();
  } else {
    player.load(); player.play().catch(()=>{});
  }
}

// ── Progress tracking ─────────────────────────────────────────────────────────
let _progressInterval = null;
function startProgressTracking() {
  if (_progressInterval) clearInterval(_progressInterval);
  _progressInterval = setInterval(()=>{
    const p = document.getElementById('player');
    if (!currentVideoId||!p||!p.duration||p.paused) return;
    const m = currentVideoMeta;
    saveProgress(currentVideoId, m.title, m.thumbnail, m.channel, p.duration, p.currentTime);
  }, 5000);
}

// ── Picture-in-Picture ────────────────────────────────────────────────────────
function initPiP() {
  const video  = document.getElementById('player');
  const pipBtn = document.getElementById('pip-btn');
  const supported = !!(document.pictureInPictureEnabled || video.webkitSupportsPresentationMode?.('picture-in-picture'));
  if (pipBtn) pipBtn.style.display = supported ? 'inline-flex' : 'none';
  video.addEventListener('enterpictureinpicture', ()=>pipBtn?.classList.add('active'));
  video.addEventListener('leavepictureinpicture', ()=>pipBtn?.classList.remove('active'));
}
async function togglePiP() {
  const video = document.getElementById('player');
  try {
    if (document.pictureInPictureEnabled) {
      document.pictureInPictureElement ? await document.exitPictureInPicture() : await video.requestPictureInPicture();
    } else if (video.webkitSupportsPresentationMode?.('picture-in-picture')) {
      video.webkitSetPresentationMode(video.webkitPresentationMode==='picture-in-picture'?'inline':'picture-in-picture');
    }
  } catch { showToast('PiP non disponible'); }
}
document.addEventListener('visibilitychange', async ()=>{
  if (!document.hidden||!currentVideoId) return;
  const video = document.getElementById('player');
  if (video.paused||document.pictureInPictureElement) return;
  try {
    if (document.pictureInPictureEnabled) await video.requestPictureInPicture();
    else if (video.webkitSupportsPresentationMode?.('picture-in-picture')) video.webkitSetPresentationMode('picture-in-picture');
  } catch {}
});

// ── Media Session ─────────────────────────────────────────────────────────────
let _mediaSessionHandler = null;

function setupMediaSession(title, channel, thumbnail) {
  if (!('mediaSession' in navigator)) return;

  function applyMeta() {
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  title   || 'MyTube',
      artist: channel || '',
      album:  '',           // vide — évite d'afficher "MyTube" comme album
      artwork: thumbnail
        ? [ {src: thumbnail, sizes: '512x512', type: 'image/jpeg'} ]
        : [],
    });
  }
  applyMeta();

  const p = document.getElementById('player');

  // Le navigateur peut réinitialiser les métadonnées au changement de source.
  // On les réapplique dès que la lecture démarre effectivement.
  p.addEventListener('playing', applyMeta, { once: true });

  const seek = d => { p.currentTime = Math.max(0, Math.min(p.duration||0, p.currentTime+d)); };
  navigator.mediaSession.setActionHandler('play',         ()=>p.play());
  navigator.mediaSession.setActionHandler('pause',        ()=>p.pause());
  navigator.mediaSession.setActionHandler('seekbackward', d=>seek(-(d?.seekOffset??10)));
  navigator.mediaSession.setActionHandler('seekforward',  d=>seek(+(d?.seekOffset??10)));
  navigator.mediaSession.setActionHandler('seekto',       d=>{ if (d?.seekTime!=null) p.currentTime=d.seekTime; });
  navigator.mediaSession.setActionHandler('nexttrack',    relatedVideos.length?()=>openVideo(relatedVideos[0].id):null);
  navigator.mediaSession.setActionHandler('previoustrack', null);

  // Sync barre de progression (écran verr.) — un seul listener
  if (_mediaSessionHandler) p.removeEventListener('timeupdate', _mediaSessionHandler);
  _mediaSessionHandler = () => {
    if (!p.duration) return;
    try { navigator.mediaSession.setPositionState({duration:p.duration, playbackRate:p.playbackRate, position:p.currentTime}); } catch {}
  };
  p.addEventListener('timeupdate', _mediaSessionHandler, {passive:true});
}

// ── Raccourcis clavier ────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if (!currentVideoId) return;
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const p = document.getElementById('player');
  switch(e.key) {
    case ' ': case 'k': e.preventDefault(); p.paused?p.play():p.pause(); break;
    case 'ArrowLeft': case 'j': e.preventDefault(); p.currentTime=Math.max(0,p.currentTime-10); showToast('−10s'); break;
    case 'ArrowRight': case 'l': e.preventDefault(); p.currentTime=Math.min(p.duration||0,p.currentTime+10); showToast('+10s'); break;
    case 'ArrowUp':   e.preventDefault(); p.volume=Math.min(1,+(p.volume+.1).toFixed(1)); showToast(`Volume ${Math.round(p.volume*100)}%`); break;
    case 'ArrowDown': e.preventDefault(); p.volume=Math.max(0,+(p.volume-.1).toFixed(1)); showToast(`Volume ${Math.round(p.volume*100)}%`); break;
    case 'f': e.preventDefault(); document.fullscreenElement?document.exitFullscreen():p.requestFullscreen?.(); break;
    case 'm': e.preventDefault(); p.muted=!p.muted; showToast(p.muted?'Muet':'Son activé'); break;
  }
});

// ── SponsorBlock ──────────────────────────────────────────────────────────────
const SB_LABELS = {
  sponsor:'Sponsor',selfpromo:'Auto-promo',interaction:'Interaction',
  intro:'Intro',outro:'Outro',preview:'Aperçu',filler:'Remplissage',music_offtopic:'Hors-sujet'
};
function renderSponsorBlock(segs) {
  const panel = document.getElementById('sb-panel');
  if (!segs.length) {
    panel.innerHTML = `<div class="sb-panel"><div class="sb-panel-title">SponsorBlock</div><div style="font-size:13px;color:var(--text3)">Aucun segment pour cette vidéo</div></div>`;
    return;
  }
  panel.innerHTML = `<div class="sb-panel">
    <div class="sb-panel-title">SponsorBlock — ${segs.length} segment(s)</div>
    ${segs.map(s=>`<div class="sb-segment"><span class="sb-cat">${SB_LABELS[s.category]||s.category}</span><span style="font-family:'Roboto Mono',monospace;font-size:12px">${fmt(s.segment[0])} → ${fmt(s.segment[1])}</span></div>`).join('')}
  </div>`;
}
function startSBMonitor() {
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  const p = document.getElementById('player');
  sbCheckInterval = setInterval(()=>{
    if (!sbSegments.length||!sbActive) return;
    const t = p.currentTime;
    for (const seg of sbSegments) {
      if (t>=seg.segment[0]&&t<seg.segment[1]) {
        p.currentTime=seg.segment[1];
        showToast(`SponsorBlock : « ${SB_LABELS[seg.category]||seg.category} » sauté`);
        break;
      }
    }
  }, 500);
}

// ── Related & Auto-next ───────────────────────────────────────────────────────
async function loadRelated(videoId, title='') {
  const panel = document.getElementById('related-panel');
  panel.innerHTML = `<div class="loader" style="padding:40px 0"><div class="spinner"></div></div>`;
  try {
    const qs = title?`?q=${encodeURIComponent(title)}`:'';
    relatedVideos = ((await (await fetch(`${API}/api/related/${videoId}${qs}`)).json()).results)||[];
    renderRelated(relatedVideos);
    if ('mediaSession' in navigator && relatedVideos.length)
      navigator.mediaSession.setActionHandler('nexttrack', ()=>openVideo(relatedVideos[0].id));
  } catch { relatedVideos=[]; panel.innerHTML=''; }
}
function renderRelated(videos) {
  const panel = document.getElementById('related-panel');
  if (!videos.length) { panel.innerHTML=''; return; }
  panel.innerHTML = `
    <div class="related-title-label">À regarder ensuite</div>
    ${videos.map(v=>`
      <div class="yt-related-card" onclick="openVideo('${v.id}')">
        <div class="yt-related-thumb">
          <img src="${escHtml(v.thumbnail||'')}" loading="lazy" alt=""
               onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
          ${v.duration?`<span class="yt-related-dur">${fmt(v.duration)}</span>`:''}
        </div>
        <div class="yt-related-text">
          <div class="yt-related-title">${escHtml(v.title)}</div>
          <div class="yt-related-channel">${escHtml(v.channel||'')}</div>
          ${v.views?`<div class="yt-related-meta">${fmtViews(v.views)}</div>`:''}
        </div>
      </div>`).join('')}`;
}
function startAutoNext() {
  if (!relatedVideos.length) return;
  const next = relatedVideos[0];
  document.getElementById('autonext-next-title').textContent = next.title;
  let count = 5;
  document.getElementById('autonext-count').textContent = count;
  document.getElementById('autonext-overlay').classList.remove('hidden');
  autoNextTimer = setInterval(()=>{ count--; document.getElementById('autonext-count').textContent=count; if(count<=0){cancelAutoNext();openVideo(next.id);} }, 1000);
}
function cancelAutoNext() {
  if (autoNextTimer) { clearInterval(autoNextTimer); autoNextTimer=null; }
  document.getElementById('autonext-overlay')?.classList.add('hidden');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderContinueWatching();
initAuth().then(()=>{ if (!authState.authenticated) loadTrending(); });
