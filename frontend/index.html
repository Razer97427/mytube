<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyTube">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>MyTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #ff4444;
    --accent2: #ff6b6b;
    --radius: 10px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100%; }
  body { min-height: 100%; overflow-x: hidden; padding-bottom: calc(60px + var(--safe-bottom)); }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: calc(12px + var(--safe-top)) 16px 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    font-size: 20px; font-weight: 600; letter-spacing: -0.5px;
    color: var(--text); text-decoration: none; flex-shrink: 0;
  }
  .logo span { color: var(--accent); }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 9px 40px 9px 14px; border-radius: 50px; outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-btn {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    background: var(--accent); border: none; color: #fff; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .search-btn:hover { background: var(--accent2); }
  .search-btn svg { width: 14px; height: 14px; }

  /* ── Main ── */
  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  /* ── Section title ── */
  .section-title {
    font-size: 13px; font-weight: 500; color: var(--text2);
    letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Grid ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  @media (max-width: 600px) {
    .video-grid { grid-template-columns: 1fr; gap: 12px; }
  }

  /* ── Card ── */
  .video-card {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    border: 1px solid var(--border);
    transition: transform .2s, border-color .2s;
  }
  .video-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .video-card:active { transform: scale(0.98); }
  .thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .duration-badge {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,.85); color: #fff;
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 2px 6px; border-radius: 4px;
  }
  .sb-badge {
    position: absolute; bottom: 6px; left: 6px;
    background: rgba(0,200,100,.9); color: #fff;
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px; letter-spacing: .04em;
  }
  .card-info { padding: 10px 12px 12px; }
  .card-title {
    font-size: 14px; font-weight: 500; line-height: 1.4;
    color: var(--text); margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta { font-size: 12px; color: var(--text2); }

  /* ── Player view ── */
  #player-view { display: none; }
  #player-view.active { display: block; }
  #home-view.hidden { display: none; }

  .player-wrap {
    background: #000; border-radius: var(--radius); overflow: hidden;
    position: relative; margin-bottom: 14px;
  }
  video {
    width: 100%; display: block; max-height: 60vh;
    background: #000;
  }
  .player-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
  .player-meta { font-size: 13px; color: var(--text2); margin-bottom: 14px; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 7px 14px; border-radius: 50px; cursor: pointer;
    margin-bottom: 14px; transition: background .2s;
  }
  .back-btn:hover { background: var(--border); }

  /* ── SponsorBlock panel ── */
  .sb-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px;
  }
  .sb-panel-title {
    font-size: 12px; font-weight: 600; color: #00c864;
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .sb-segment {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text2); padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .sb-segment:last-child { border-bottom: none; }
  .sb-cat { color: var(--text); font-weight: 500; }

  /* ── Quality selector ── */
  .quality-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .q-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 5px 10px; border-radius: 6px; cursor: pointer;
    transition: all .15s;
  }
  .q-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Loading ── */
  .loader {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; gap: 14px; color: var(--text3);
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
  .empty-text { font-size: 15px; }

  /* ── Bottom nav ── */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 10px 0; cursor: pointer; color: var(--text3);
    background: none; border: none; font-family: 'DM Sans', sans-serif;
    font-size: 10px; transition: color .15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-size: 13px; padding: 10px 18px; border-radius: 50px;
    opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <a class="logo" href="#" onclick="showHome()">My<span>Tube</span></a>
  <div class="search-wrap">
    <input type="search" id="search-input" placeholder="Rechercher..." 
           onkeydown="if(event.key==='Enter') doSearch()">
    <button class="search-btn" onclick="doSearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>
</header>

<main>
  <!-- Home / Search -->
  <div id="home-view">
    <div id="content">
      <div class="loader"><div class="spinner"></div><span>Chargement des tendances…</span></div>
    </div>
  </div>

  <!-- Player -->
  <div id="player-view">
    <button class="back-btn" onclick="showHome()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour
    </button>

    <div class="player-wrap">
      <video id="player" controls playsinline preload="metadata"></video>
    </div>

    <div class="quality-bar" id="quality-bar"></div>

    <div id="sb-panel"></div>

    <div id="video-meta"></div>
  </div>
</main>

<nav>
  <button class="nav-btn active" id="nav-home" onclick="showHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
    Accueil
  </button>
  <button class="nav-btn" id="nav-search" onclick="focusSearch()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    Recherche
  </button>
  <button class="nav-btn" id="nav-trending" onclick="loadTrending()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22,7 13.5,15.5 8.5,10.5 2,17"/>
      <polyline points="16,7 22,7 22,13"/>
    </svg>
    Tendances
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = '';  // même origine via nginx proxy

// ── État ────────────────────────────────────────────────────────────────────
let currentVideoId = null;
let sbSegments = [];
let sbActive = true;
let sbCheckInterval = null;

// ── Utilitaires ─────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s) return '';
  s = Math.round(s);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtViews(n) {
  if (!n) return '';
  if (n >= 1e6) return `${(n/1e6).toFixed(1)}M vues`;
  if (n >= 1e3) return `${(n/1e3).toFixed(0)}K vues`;
  return `${n} vues`;
}
function fmtDate(s) {
  if (!s || s.length < 8) return '';
  return `${s.slice(6,8)}/${s.slice(4,6)}/${s.slice(0,4)}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Navigation ───────────────────────────────────────────────────────────────
function showHome() {
  document.getElementById('player-view').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player').pause();
  document.getElementById('player').src = '';
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  sbSegments = [];
  currentVideoId = null;
  setNavActive('nav-home');
}
function focusSearch() {
  document.getElementById('search-input').focus();
  setNavActive('nav-search');
}
function setNavActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

// ── Rendu cards ──────────────────────────────────────────────────────────────
function renderCards(videos, title) {
  const content = document.getElementById('content');
  if (!videos.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">Aucun résultat</div></div>`;
    return;
  }
  const cards = videos.map(v => `
    <div class="video-card" onclick="openVideo('${v.id}')">
      <div class="thumb-wrap">
        <img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
        ${v.duration ? `<div class="duration-badge">${fmt(v.duration)}</div>` : ''}
        <div class="sb-badge">SB</div>
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(v.title)}</div>
        <div class="card-meta">${escHtml(v.channel || '')}${v.views ? ' · ' + fmtViews(v.views) : ''}</div>
      </div>
    </div>`).join('');

  content.innerHTML = `
    <div class="section-title">${title}</div>
    <div class="video-grid">${cards}</div>`;
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tendances ────────────────────────────────────────────────────────────────
async function loadTrending() {
  setNavActive('nav-trending');
  document.getElementById('content').innerHTML = `<div class="loader"><div class="spinner"></div><span>Chargement des tendances…</span></div>`;
  try {
    const r = await fetch(`${API}/api/trending`);
    const data = await r.json();
    renderCards(data.results || [], 'Tendances');
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur de connexion au backend</div></div>`;
  }
}

// ── Recherche ────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  setNavActive('nav-search');
  document.getElementById('content').innerHTML = `<div class="loader"><div class="spinner"></div><span>Recherche en cours…</span></div>`;
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&limit=30`);
    const data = await r.json();
    renderCards(data.results || [], `Résultats pour "${q}"`);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur de connexion</div></div>`;
  }
}

// ── Player ───────────────────────────────────────────────────────────────────
async function openVideo(videoId) {
  currentVideoId = videoId;
  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('player-view').classList.add('active');
  document.getElementById('video-meta').innerHTML = `<div class="loader"><div class="spinner"></div><span>Chargement…</span></div>`;
  document.getElementById('sb-panel').innerHTML = '';
  document.getElementById('quality-bar').innerHTML = '';

  try {
    // Charger infos vidéo + SponsorBlock en parallèle
    const [infoRes, sbRes] = await Promise.all([
      fetch(`${API}/api/video/${videoId}`),
      fetch(`${API}/api/sponsorblock/${videoId}`)
    ]);

    const info = await infoRes.json();
    const sbData = await sbRes.json();

    // Métadonnées
    document.getElementById('video-meta').innerHTML = `
      <div class="player-title">${escHtml(info.title)}</div>
      <div class="player-meta">${escHtml(info.channel)} · ${fmtViews(info.views)} · ${fmtDate(info.published)}</div>
      ${info.description ? `<div style="font-size:13px;color:var(--text2);line-height:1.5;margin-top:8px">${escHtml(info.description)}</div>` : ''}
    `;

    // Sélecteur de qualité
    const qBar = document.getElementById('quality-bar');
    if (info.formats && info.formats.length) {
      info.formats.forEach((f, i) => {
        const btn = document.createElement('button');
        btn.className = 'q-btn' + (i === 0 ? ' active' : '');
        btn.textContent = f.quality ? `${f.quality}p` : f.format_id;
        btn.onclick = () => {
          document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadStream(videoId, f.quality || 720);
        };
        qBar.appendChild(btn);
      });
    }

    // Lancer le stream
    loadStream(videoId, info.formats?.[0]?.quality || 720);

    // SponsorBlock
    sbSegments = sbData.segments || [];
    renderSponsorBlock(sbSegments);
    startSBMonitor();

  } catch(e) {
    document.getElementById('video-meta').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Impossible de charger la vidéo</div></div>`;
  }
}

function loadStream(videoId, quality) {
  const player = document.getElementById('player');
  const savedTime = player.currentTime;
  player.src = `${API}/api/stream/${videoId}?quality=${quality}`;
  // Sur iOS, currentTime ne peut être fixé qu'après loadedmetadata.
  // Sans cet event, le seek est ignoré silencieusement.
  if (savedTime > 0) {
    player.addEventListener('loadedmetadata', () => {
      player.currentTime = savedTime;
      player.play().catch(() => {});
    }, { once: true });
    player.load();
  } else {
    player.load();
    player.play().catch(() => {});
  }
}

// ── SponsorBlock ─────────────────────────────────────────────────────────────
const SB_LABELS = {
  sponsor: 'Sponsor',
  selfpromo: 'Auto-promo',
  interaction: 'Interaction',
  intro: 'Intro',
  outro: 'Outro',
  preview: 'Aperçu',
  filler: 'Remplissage',
  'music_offtopic': 'Hors-sujet'
};

function renderSponsorBlock(segments) {
  const panel = document.getElementById('sb-panel');
  if (!segments.length) {
    panel.innerHTML = `<div class="sb-panel"><div class="sb-panel-title">⬡ SponsorBlock</div><div style="font-size:12px;color:var(--text3)">Aucun segment signalé pour cette vidéo</div></div>`;
    return;
  }
  const rows = segments.map(s => `
    <div class="sb-segment">
      <span class="sb-cat">${SB_LABELS[s.category] || s.category}</span>
      <span>${fmt(s.segment[0])} → ${fmt(s.segment[1])}</span>
    </div>`).join('');
  panel.innerHTML = `
    <div class="sb-panel">
      <div class="sb-panel-title">⬡ SponsorBlock — ${segments.length} segment(s) détecté(s)</div>
      ${rows}
    </div>`;
}

function startSBMonitor() {
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  const player = document.getElementById('player');
  sbCheckInterval = setInterval(() => {
    if (!sbSegments.length || !sbActive) return;
    const t = player.currentTime;
    for (const seg of sbSegments) {
      const [start, end] = seg.segment;
      if (t >= start && t < end) {
        player.currentTime = end;
        showToast(`⬡ Segment "${SB_LABELS[seg.category] || seg.category}" sauté`);
        break;
      }
    }
  }, 500);
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadTrending();
</script>
</body>
</html>
