<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyTube">
<meta name="theme-color" content="#050505">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>MyTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #050505;
  --surface:  #111;
  --surface2: #1a1a1a;
  --surface3: #242424;
  --border:   #272727;
  --text:     #f1f1f1;
  --text2:    #909090;
  --text3:    #525252;
  --accent:   #ff4444;
  --accent2:  #ff6b6b;
  --radius:   12px;
  --sidebar:  240px;
  --safe-top:    env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
body { overflow-x: hidden; }

/* ══ LAYOUT ══════════════════════════════════════════════════════════════════ */
@media (min-width: 900px) {
  body { padding-bottom: 0; }
  .mobile-header, .bottom-nav { display: none !important; }
  .sidebar { display: flex !important; }
  .app-body { margin-left: var(--sidebar); }
}
@media (max-width: 899px) {
  .sidebar { display: none !important; }
  .app-body { margin-left: 0; }
  body { padding-bottom: calc(64px + var(--safe-bottom)); }
}

/* ══ SIDEBAR ═════════════════════════════════════════════════════════════════ */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar);
  background: var(--bg); border-right: 1px solid var(--border);
  display: none; flex-direction: column; z-index: 50; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--surface3) transparent;
}
.sidebar-logo {
  font-size: 22px; font-weight: 700; letter-spacing: -0.6px;
  color: var(--text); padding: 22px 22px 18px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo span { color: var(--accent); }
.sidebar-search-wrap {
  padding: 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-search-wrap input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 9px 14px; border-radius: 8px; outline: none; transition: border-color .2s;
}
.sidebar-search-wrap input:focus { border-color: var(--accent); }
.sidebar-search-wrap input::placeholder { color: var(--text3); }
.sidebar-nav { padding: 10px 0; }
.sidebar-btn {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 12px 22px;
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; text-align: left;
  transition: background .15s, color .15s; position: relative;
}
.sidebar-btn:hover { background: var(--surface2); color: var(--text); }
.sidebar-btn.active { color: var(--accent); }
.sidebar-btn.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.sidebar-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ══ AUTH SECTION (sidebar) ══════════════════════════════════════════════════ */
.sidebar-auth {
  border-top: 1px solid var(--border); padding: 14px;
  flex-shrink: 0; margin-top: auto;
}
.login-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 10px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; border-radius: 10px;
  cursor: pointer; transition: all .2s;
}
.login-btn:hover { background: var(--surface3); border-color: var(--text3); }
.login-btn svg { width: 16px; height: 16px; }
.user-row {
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  padding: 8px 10px; border-radius: 10px; transition: background .15s;
  position: relative;
}
.user-row:hover { background: var(--surface2); }
.user-avatar-img {
  width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
}
.user-avatar-fallback {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name  { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-menu-dropdown {
  position: absolute; bottom: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  display: none;
}
.user-menu-dropdown.open { display: block; }
.user-menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; cursor: pointer; font-size: 13px; color: var(--text2);
  transition: background .15s; border: none; background: none;
  width: 100%; font-family: 'DM Sans', sans-serif; text-align: left;
}
.user-menu-item:hover { background: var(--surface3); color: var(--text); }
.user-menu-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.user-menu-item.danger { color: #ff6b6b; }

/* ══ SUBSCRIPTIONS SECTION (sidebar) ════════════════════════════════════════ */
.subs-section { border-top: 1px solid var(--border); flex-shrink: 0; }
.subs-header {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: .1em; text-transform: uppercase;
  padding: 14px 22px 8px; display: flex; align-items: center; gap: 8px;
}
.subs-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.sub-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 8px 22px;
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 400; text-align: left;
  transition: background .15s, color .15s;
}
.sub-btn:hover { background: var(--surface2); color: var(--text); }
.sub-thumb {
  width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
  background: var(--surface3);
}
.sub-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

/* ══ MOBILE HEADER ═══════════════════════════════════════════════════════════ */
.mobile-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(5,5,5,.96); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: calc(12px + var(--safe-top)) 16px 12px;
  display: flex; align-items: center; gap: 12px;
}
.mobile-logo {
  font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text); text-decoration: none; flex-shrink: 0;
}
.mobile-logo span { color: var(--accent); }
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  padding: 9px 42px 9px 14px; border-radius: 50px; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }
.search-btn {
  position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
  background: var(--accent); border: none; color: #fff; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; transition: background .2s;
}
.search-btn:hover { background: var(--accent2); }
.search-btn svg { width: 14px; height: 14px; }
.mobile-auth-btn {
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s;
}
.mobile-auth-btn:hover { background: var(--surface3); }
.mobile-auth-btn img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
.mobile-auth-btn svg { width: 16px; height: 16px; color: var(--text2); }

/* ══ MAIN ════════════════════════════════════════════════════════════════════ */
.app-body { min-height: 100vh; }
main { padding: 20px; max-width: 1500px; margin: 0 auto; }
@media (min-width: 900px) { main { padding: 28px 32px; } }

.content-search {
  display: none; gap: 10px; margin-bottom: 28px;
}
@media (min-width: 900px) { .content-search { display: flex; } }
.content-search input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  padding: 12px 20px; border-radius: 50px; outline: none; transition: border-color .2s;
}
.content-search input:focus { border-color: var(--accent); }
.content-search input::placeholder { color: var(--text3); }
.content-search button {
  background: var(--accent); border: none; color: #fff; cursor: pointer;
  padding: 12px 22px; border-radius: 50px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; transition: background .2s;
  display: flex; align-items: center; gap: 8px; white-space: nowrap;
}
.content-search button:hover { background: var(--accent2); }
.content-search button svg { width: 15px; height: 15px; }

/* ══ SECTION TITLE ═══════════════════════════════════════════════════════════ */
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 18px; display: flex; align-items: center; gap: 12px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ══ CONTINUE WATCHING ═══════════════════════════════════════════════════════ */
.continue-section { margin-bottom: 32px; }
.continue-row {
  display: flex; gap: 12px; overflow-x: auto; padding-bottom: 6px;
  scrollbar-width: thin; scrollbar-color: var(--surface3) transparent;
  -webkit-overflow-scrolling: touch;
}
.continue-row::-webkit-scrollbar { height: 4px; }
.continue-row::-webkit-scrollbar-track { background: transparent; }
.continue-row::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
.continue-card {
  flex-shrink: 0; width: 220px; background: var(--surface); border-radius: 10px;
  overflow: hidden; cursor: pointer; border: 1px solid transparent;
  transition: transform .2s, box-shadow .2s, border-color .2s;
}
.continue-card:hover {
  transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.5);
  border-color: var(--border);
}
.continue-card:active { transform: scale(.97); }
.continue-thumb { position: relative; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden; }
.continue-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
.continue-card:hover .continue-thumb img { transform: scale(1.04); }
.continue-progress-bar {
  position: absolute; bottom: 0; left: 0; height: 3px;
  background: var(--accent); border-radius: 0 2px 2px 0;
  pointer-events: none;
}
.continue-info { padding: 8px 10px 10px; }
.continue-title {
  font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 3px;
}
.continue-meta { font-size: 11px; color: var(--text2); }

/* ══ GRILLE VIDÉOS ═══════════════════════════════════════════════════════════ */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 20px;
}
@media (max-width: 599px)  { .video-grid { grid-template-columns: 1fr; gap: 12px; } }
@media (min-width: 600px) and (max-width: 899px) { .video-grid { grid-template-columns: repeat(2,1fr); gap: 14px; } }

/* ══ CARDS ═══════════════════════════════════════════════════════════════════ */
.video-card {
  background: var(--surface); border-radius: var(--radius); overflow: hidden;
  cursor: pointer; border: 1px solid transparent;
  transition: transform .22s ease, box-shadow .22s ease, border-color .22s;
}
.video-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 16px 48px rgba(0,0,0,.65);
  border-color: var(--border);
}
.video-card:active { transform: scale(.97); }
.thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
.thumb-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform .3s ease;
}
.video-card:hover .thumb-wrap img { transform: scale(1.04); }
.thumb-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.72) 0%, transparent 55%);
  pointer-events: none;
}
.duration-badge {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(0,0,0,.92); color: #fff;
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 2px 7px; border-radius: 5px; font-weight: 500;
}
.card-info { padding: 12px 14px 14px; }
.card-title {
  font-size: 14px; font-weight: 500; line-height: 1.42; color: var(--text);
  margin-bottom: 7px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta { font-size: 12px; color: var(--text2); display: flex; flex-wrap: wrap; align-items: center; gap: 3px; }
.card-meta .sep { color: var(--text3); }

/* ══ SKELETON LOADING ════════════════════════════════════════════════════════ */
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 20px;
}
@media (max-width: 599px)  { .skeleton-grid { grid-template-columns: 1fr; gap: 12px; } }
@media (min-width: 600px) and (max-width: 899px) { .skeleton-grid { grid-template-columns: repeat(2,1fr); gap: 14px; } }
.sk-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.sk-thumb { aspect-ratio: 16/9; animation: sk-pulse 1.6s ease-in-out infinite; }
.sk-body { padding: 12px 14px; }
.sk-line {
  border-radius: 6px; animation: sk-pulse 1.6s ease-in-out infinite;
  height: 13px; margin-bottom: 9px;
}
.sk-line.w80 { width: 80%; }
.sk-line.w50 { width: 50%; }
@keyframes sk-pulse {
  0%, 100% { background: var(--surface2); }
  50%       { background: var(--surface3); }
}

/* ══ PLAYER VIEW ═════════════════════════════════════════════════════════════ */
#player-view  { display: none; }
#player-view.active { display: block; }
#home-view.hidden   { display: none; }

.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 7px 16px; border-radius: 50px; cursor: pointer;
  margin-bottom: 18px; transition: all .2s;
}
.back-btn:hover { background: var(--surface3); color: var(--text); }

.player-layout { display: flex; gap: 22px; align-items: flex-start; }
.player-main   { flex: 1; min-width: 0; }
.player-sidebar { width: 360px; flex-shrink: 0; }
@media (max-width: 1180px) { .player-layout { flex-direction: column; } .player-sidebar { width: 100%; } }

.player-wrap {
  background: #000; border-radius: var(--radius); overflow: hidden;
  position: relative; margin-bottom: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,.7);
}
video { width: 100%; display: block; max-height: 66vh; background: #000; }

.player-title { font-size: 18px; font-weight: 600; line-height: 1.3; margin-bottom: 12px; }
.player-channel {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 14px; margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.channel-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.channel-name  { font-size: 14px; font-weight: 600; color: var(--text); }
.channel-stats { font-size: 12px; color: var(--text2); margin-top: 1px; }
.player-desc   { font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 6px; }

/* ══ QUALITY BAR ═════════════════════════════════════════════════════════════ */
.quality-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.q-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-right: 4px; }
.q-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; font-family: 'DM Mono', monospace;
  padding: 5px 12px; border-radius: 8px; cursor: pointer; transition: all .15s;
}
.q-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.q-btn:hover:not(.active) { background: var(--surface3); color: var(--text); }

/* ══ SPONSORBLOCK ════════════════════════════════════════════════════════════ */
.sb-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px;
}
.sb-panel-title {
  font-size: 10px; font-weight: 800; color: #00c864;
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.sb-segment {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text2); padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.sb-segment:last-child { border-bottom: none; }
.sb-cat { color: var(--text); font-weight: 600; font-size: 12px; }

/* ══ RELATED CARDS ═══════════════════════════════════════════════════════════ */
.related-section-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.related-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.related-card {
  display: flex; gap: 10px; cursor: pointer;
  padding: 8px; border-radius: 10px;
  transition: background .15s; margin-bottom: 2px;
}
.related-card:hover  { background: var(--surface2); }
.related-card:active { transform: scale(.98); }
.related-thumb {
  position: relative; width: 148px; flex-shrink: 0;
  aspect-ratio: 16/9; border-radius: 8px; overflow: hidden;
  background: var(--surface2);
}
.related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.related-info { flex: 1; min-width: 0; padding-top: 2px; }
.related-title {
  font-size: 13px; font-weight: 500; line-height: 1.38; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 5px;
}
.related-meta { font-size: 11px; color: var(--text2); }
@media (max-width: 599px) { .related-thumb { width: 118px; } }

/* ══ AUTO-NEXT OVERLAY ═══════════════════════════════════════════════════════ */
.autonext-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.86); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 10; border-radius: var(--radius);
}
.autonext-overlay.hidden { display: none; }
.autonext-content { text-align: center; padding: 24px; max-width: 320px; }
.autonext-label {
  font-size: 10px; font-weight: 800; color: var(--text2);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px;
}
.autonext-countdown {
  font-size: 68px; font-weight: 700; color: var(--accent);
  font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 12px;
}
.autonext-next-title {
  font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 20px;
}
.autonext-cancel-btn {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; padding: 9px 24px; border-radius: 50px;
  cursor: pointer; transition: background .2s;
}
.autonext-cancel-btn:hover { background: rgba(255,255,255,.2); }

/* ══ ÉTATS ═══════════════════════════════════════════════════════════════════ */
.loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 64px 20px; gap: 14px; color: var(--text3);
  font-size: 14px;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 64px 20px; color: var(--text3); }
.empty-icon { font-size: 52px; margin-bottom: 14px; opacity: .25; }
.empty-text { font-size: 15px; }

/* ══ BOTTOM NAV ══════════════════════════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(5,5,5,.97);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex; padding-bottom: var(--safe-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 0; cursor: pointer; color: var(--text3);
  background: none; border: none; font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: .02em;
  transition: color .15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 21px; height: 21px; }

/* ══ TOAST ═══════════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface3); border: 1px solid var(--border); color: var(--text);
  font-size: 13px; padding: 9px 20px; border-radius: 50px;
  opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; white-space: nowrap; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@media (min-width: 900px) { .toast { bottom: 28px; } }

/* ══ AUTH MODAL ══════════════════════════════════════════════════════════════ */
.auth-modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); padding: 20px;
}
.auth-modal-backdrop.open { display: flex; }
.auth-modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 32px 28px; width: 100%; max-width: 400px;
  text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.auth-modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.auth-modal .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }
.device-code-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 18px;
}
.device-code-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
.device-code {
  font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 700;
  color: var(--text); letter-spacing: .12em; margin-bottom: 12px;
}
.device-url-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  padding: 10px 22px; border-radius: 50px; text-decoration: none;
  transition: background .2s;
}
.device-url-btn:hover { background: var(--accent2); }
.auth-step {
  display: flex; align-items: flex-start; gap: 12px;
  text-align: left; margin-bottom: 10px;
}
.auth-step-num {
  width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
  color: #fff; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.auth-step-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
.auth-step-text strong { color: var(--text); }
.auth-waiting {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 13px; color: var(--text3); margin-top: 20px;
}
.auth-modal-close {
  background: none; border: none; color: var(--text3); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; padding: 8px; margin-top: 12px; display: block; width: 100%;
}

/* ══ MOBILE AUTH SHEET ═══════════════════════════════════════════════════════ */
.auth-sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(6px);
}
.auth-sheet-backdrop.open { display: flex; }
.auth-sheet {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0; padding: 24px 24px calc(24px + var(--safe-bottom));
  width: 100%; max-width: 480px; text-align: center;
}
.auth-sheet h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.auth-sheet p  { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
.auth-sheet .login-btn { max-width: 260px; margin: 0 auto 12px; }
.auth-sheet-close {
  background: none; border: none; color: var(--text3); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; padding: 8px;
}
</style>
</head>

<!-- ── Auth modal ── -->
<div class="auth-modal-backdrop" id="auth-modal-backdrop" onclick="if(event.target===this)closeAuthModal()">
  <div class="auth-modal" id="auth-modal">
    <!-- rempli dynamiquement -->
  </div>
</div>

<!-- ── Auth sheet mobile ── -->
<div class="auth-sheet-backdrop" id="auth-sheet-backdrop" onclick="if(event.target===this)closeAuthSheet()">
  <div class="auth-sheet" id="auth-sheet">
    <!-- rempli dynamiquement -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';

// ── État ──────────────────────────────────────────────────────────────────────
let currentVideoId   = null;
let currentVideoMeta = {};
let sbSegments       = [];
let sbActive         = true;
let sbCheckInterval  = null;
let relatedVideos    = [];
let autoNextTimer    = null;
let authState        = { authenticated: false, user: null, google_configured: false };

// ── Utilitaires ───────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s) return '';
  s = Math.round(s);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtViews(n) {
  if (!n) return '';
  if (n >= 1e9) return `${(n/1e9).toFixed(1)}G vues`;
  if (n >= 1e6) return `${(n/1e6).toFixed(1)}M vues`;
  if (n >= 1e3) return `${(n/1e3).toFixed(0)}K vues`;
  return `${n} vues`;
}
function fmtDate(s) {
  if (!s || s.length < 8) return '';
  return `${s.slice(6,8)}/${s.slice(4,6)}/${s.slice(0,4)}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}
function channelColor(name) {
  const palette = ['#e74c3c','#e67e22','#f39c12','#27ae60','#16a085','#2980b9','#8e44ad','#c0392b','#d35400','#1abc9c'];
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return palette[Math.abs(h) % palette.length];
}

// ── Watch History (localStorage) ─────────────────────────────────────────────
const HISTORY_KEY = 'mytube_history_v2';
const MAX_HISTORY = 200;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}
function saveHistory(arr) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); } catch {}
}
function saveProgress(videoId, title, thumbnail, channel, duration, currentTime) {
  if (!videoId || duration < 10) return;
  const pct = currentTime / duration;
  // Ne pas sauvegarder si moins de 5% ou plus de 95% (terminé)
  if (pct < 0.05) return;
  const hist = getHistory().filter(h => h.id !== videoId);
  hist.unshift({
    id: videoId, title, thumbnail, channel, duration,
    currentTime: pct > 0.95 ? 0 : currentTime,
    pct: pct > 0.95 ? 1 : pct,
    ts: Date.now(),
  });
  saveHistory(hist.slice(0, MAX_HISTORY));
}
function getContinueWatching() {
  return getHistory().filter(h => h.pct > 0.05 && h.pct < 0.95).slice(0, 10);
}
function getWatchedHistory() {
  return getHistory().slice(0, 60);
}

// ── Auth — Device Code Flow ───────────────────────────────────────────────────
let _pollInterval  = null;
let _pollId        = null;
let _pollIntervalS = 5;

async function initAuth() {
  try {
    const r = await fetch(`${API}/auth/status`);
    authState = await r.json();
  } catch {
    authState = { authenticated: false, user: null };
  }
  renderSidebarAuth();
  renderMobileAuthBtn();
  if (authState.authenticated) loadSubscriptions();
}

function renderSidebarAuth() {
  const el = document.getElementById('sidebar-auth');
  if (authState.authenticated) {
    const u = authState.user;
    const color = channelColor(u.name);
    const avatarHtml = u.picture
      ? `<img class="user-avatar-img" src="${escHtml(u.picture)}" alt="">`
      : `<div class="user-avatar-fallback" style="background:${color}22;color:${color}">${(u.name||'?').charAt(0).toUpperCase()}</div>`;
    el.innerHTML = `
      <div class="user-row" onclick="toggleUserMenu()">
        ${avatarHtml}
        <div class="user-info">
          <div class="user-name">${escHtml(u.name||'')}</div>
          <div class="user-email">${escHtml(u.email||'')}</div>
        </div>
        <div id="user-menu-dropdown" class="user-menu-dropdown">
          <button class="user-menu-item" onclick="showPersonalFeed();event.stopPropagation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Mon fil
          </button>
          <button class="user-menu-item danger" onclick="doLogout();event.stopPropagation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Déconnexion
          </button>
        </div>
      </div>`;
  } else {
    el.innerHTML = `
      <button class="login-btn" onclick="startDeviceLogin()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Se connecter avec Google
      </button>`;
  }
}

function renderMobileAuthBtn() {
  const btn = document.getElementById('mobile-auth-btn');
  if (authState.authenticated && authState.user?.picture) {
    btn.innerHTML = `<img src="${escHtml(authState.user.picture)}" alt="">`;
  } else {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--text2)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  }
}

function toggleUserMenu() {
  document.getElementById('user-menu-dropdown')?.classList.toggle('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('user-menu-dropdown');
  if (menu?.classList.contains('open') && !e.target.closest('.user-row')) {
    menu.classList.remove('open');
  }
});

async function doLogout() {
  await fetch(`${API}/auth/logout`, { method: 'POST' });
  authState = { authenticated: false, user: null };
  renderSidebarAuth();
  renderMobileAuthBtn();
  document.getElementById('subs-section').style.display = 'none';
  document.getElementById('subs-list').innerHTML = '';
  closeAuthSheet();
  closeAuthModal();
  showToast('Déconnecté');
}

// ── Device code login flow ────────────────────────────────────────────────────
async function startDeviceLogin() {
  const modal = document.getElementById('auth-modal');
  document.getElementById('auth-modal-backdrop').classList.add('open');
  modal.innerHTML = `<div class="loader" style="padding:32px 0"><div class="spinner"></div><span>Connexion à Google…</span></div>`;

  let data;
  try {
    const r = await fetch(`${API}/auth/device/start`);
    data = await r.json();
    if (!data.poll_id) throw new Error(data.detail || 'Erreur');
  } catch (e) {
    modal.innerHTML = `
      <h3>Erreur</h3>
      <p class="subtitle">${escHtml(String(e))}</p>
      <button class="auth-modal-close" onclick="closeAuthModal()">Fermer</button>`;
    return;
  }

  _pollId        = data.poll_id;
  _pollIntervalS = data.interval || 5;

  modal.innerHTML = `
    <h3>Connexion Google</h3>
    <p class="subtitle">Ouvrez le lien ci-dessous et entrez ce code :</p>
    <div class="device-code-box">
      <div class="device-code-label">Votre code</div>
      <div class="device-code" id="device-code-txt">${escHtml(data.user_code)}</div>
      <a class="device-url-btn" href="${escHtml(data.verification_url)}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ouvrir google.com/device
      </a>
    </div>
    <div class="auth-step">
      <div class="auth-step-num">1</div>
      <div class="auth-step-text">Cliquez sur le bouton ci-dessus (ou allez sur <strong>google.com/device</strong>)</div>
    </div>
    <div class="auth-step">
      <div class="auth-step-num">2</div>
      <div class="auth-step-text">Entrez le code <strong>${escHtml(data.user_code)}</strong> et connectez-vous</div>
    </div>
    <div class="auth-step">
      <div class="auth-step-num">3</div>
      <div class="auth-step-text">Cette fenêtre se ferme automatiquement</div>
    </div>
    <div class="auth-waiting">
      <div class="spinner" style="width:16px;height:16px;border-width:2px"></div>
      En attente de validation…
    </div>
    <button class="auth-modal-close" onclick="cancelDeviceLogin()">Annuler</button>`;

  stopDevicePoll();
  _pollInterval = setInterval(pollDeviceCode, _pollIntervalS * 1000);
}

async function pollDeviceCode() {
  if (!_pollId) return;
  try {
    const r = await fetch(`${API}/auth/device/poll?poll_id=${_pollId}`);
    const d = await r.json();
    if (d.status === 'authorized') {
      stopDevicePoll();
      authState = { authenticated: true, user: d.user };
      closeAuthModal();
      closeAuthSheet();
      renderSidebarAuth();
      renderMobileAuthBtn();
      loadSubscriptions();
      showToast(`Connecté en tant que ${d.user?.name || 'Google'}`);
      if (authState.authenticated) showPersonalFeed();
    } else if (d.status === 'expired' || d.status === 'error') {
      stopDevicePoll();
      const modal = document.getElementById('auth-modal');
      modal.innerHTML = `
        <h3>${d.status === 'expired' ? 'Code expiré' : 'Erreur'}</h3>
        <p class="subtitle">${d.status === 'expired' ? 'Le code a expiré. Réessayez.' : escHtml(d.message||'')}</p>
        <button class="login-btn" onclick="startDeviceLogin()" style="margin:0 auto 12px">Réessayer</button>
        <button class="auth-modal-close" onclick="closeAuthModal()">Annuler</button>`;
    }
    // status === 'pending' → on continue à poller
  } catch {}
}

function stopDevicePoll() {
  if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
  _pollId = null;
}
function cancelDeviceLogin() {
  stopDevicePoll();
  closeAuthModal();
}
function closeAuthModal() {
  document.getElementById('auth-modal-backdrop').classList.remove('open');
}

function toggleMobileAuthSheet() {
  const backdrop = document.getElementById('auth-sheet-backdrop');
  if (backdrop.classList.contains('open')) { closeAuthSheet(); return; }
  const sheet = document.getElementById('auth-sheet');
  if (authState.authenticated) {
    const u = authState.user;
    const color = channelColor(u.name);
    const avatarHtml = u.picture
      ? `<img src="${escHtml(u.picture)}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block" alt="">`
      : `<div style="width:52px;height:52px;border-radius:50%;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 12px">${(u.name||'?').charAt(0).toUpperCase()}</div>`;
    sheet.innerHTML = `
      ${avatarHtml}
      <h3>${escHtml(u.name||'')}</h3>
      <p>${escHtml(u.email||'')}</p>
      <button class="login-btn" onclick="showPersonalFeed();closeAuthSheet()">Mon fil personnalisé</button>
      <button class="login-btn" style="margin:8px auto 0;color:var(--accent2);border-color:var(--accent)" onclick="doLogout()">Se déconnecter</button>`;
  } else {
    sheet.innerHTML = `
      <h3>Connexion</h3>
      <p>Connectez votre compte Google pour accéder à votre fil personnalisé et vos abonnements.</p>
      <button class="login-btn" onclick="closeAuthSheet();startDeviceLogin()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Se connecter avec Google
      </button>
      <button class="auth-sheet-close" onclick="closeAuthSheet()">Fermer</button>`;
  }
  backdrop.classList.add('open');
}
function closeAuthSheet() {
  document.getElementById('auth-sheet-backdrop').classList.remove('open');
}

// ── Abonnements ───────────────────────────────────────────────────────────────
async function loadSubscriptions() {
  try {
    const r = await fetch(`${API}/api/subscriptions`);
    if (!r.ok) return;
    const data = await r.json();
    const subs = data.subscriptions || [];
    if (!subs.length) return;
    const section = document.getElementById('subs-section');
    const list    = document.getElementById('subs-list');
    section.style.display = 'block';
    list.innerHTML = subs.slice(0, 20).map(s => `
      <button class="sub-btn" onclick="openChannel('${escHtml(s.id)}', '${escHtml(s.title)}')">
        ${s.thumbnail
          ? `<img class="sub-thumb" src="${escHtml(s.thumbnail)}" alt="">`
          : `<div class="sub-thumb" style="background:${channelColor(s.title)}22;color:${channelColor(s.title)};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${(s.title||'?').charAt(0).toUpperCase()}</div>`}
        <span class="sub-name">${escHtml(s.title)}</span>
      </button>`).join('');
  } catch {}
}

async function openChannel(channelId, channelName) {
  setSNavActive(null);
  showSkeleton(12);
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player-view').classList.remove('active');
  try {
    const r = await fetch(`${API}/api/channel/${channelId}`);
    const data = await r.json();
    renderCards(data.results || [], channelName || 'Chaîne');
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Impossible de charger la chaîne</div></div>`;
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showHome() {
  document.getElementById('player-view').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  const player = document.getElementById('player');
  player.pause(); player.src = '';
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  cancelAutoNext();
  sbSegments = []; relatedVideos = []; currentVideoId = null; currentVideoMeta = {};
  setNavActive('nav-home');
  setSNavActive('snav-home');
  renderContinueWatching();
  if (authState.authenticated) {
    showPersonalFeed();
  } else {
    loadTrending();
  }
}

async function showPersonalFeed() {
  setSNavActive('snav-home');
  showSkeleton(20);
  try {
    const r = await fetch(`${API}/api/feed`);
    if (!r.ok) throw new Error();
    renderCards((await r.json()).results || [], 'Pour vous');
  } catch {
    loadTrending();
  }
}

function showHistory() {
  setNavActive('nav-history');
  setSNavActive('snav-history');
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player-view').classList.remove('active');
  const hist = getWatchedHistory();
  if (!hist.length) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">🕐</div><div class="empty-text">Aucun historique de visionnage</div></div>`;
    return;
  }
  renderCards(hist.map(h => ({
    id: h.id, title: h.title, thumbnail: h.thumbnail,
    channel: h.channel, duration: h.duration,
  })), 'Historique');
}

function focusSearch() {
  const el = document.getElementById('search-mobile') || document.getElementById('search-sidebar');
  el?.focus();
  setNavActive('nav-search');
}
function setNavActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}
function setSNavActive(id) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  if (id) document.getElementById(id)?.classList.add('active');
}

// ── Continue watching ─────────────────────────────────────────────────────────
function renderContinueWatching() {
  const cont = getContinueWatching();
  const section = document.getElementById('continue-section');
  const row     = document.getElementById('continue-row');
  if (!cont.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  row.innerHTML = cont.map(h => `
    <div class="continue-card" onclick="openVideo('${h.id}', ${h.currentTime || 0})">
      <div class="continue-thumb">
        <img src="${escHtml(h.thumbnail||'')}" alt="" loading="lazy"
             onerror="this.src='https://i.ytimg.com/vi/${h.id}/hqdefault.jpg'">
        <div class="continue-progress-bar" style="width:${Math.round((h.pct||0)*100)}%"></div>
      </div>
      <div class="continue-info">
        <div class="continue-title">${escHtml(h.title||'')}</div>
        <div class="continue-meta">${escHtml(h.channel||'')}${h.duration ? ' · ' + fmt(h.duration) : ''}</div>
      </div>
    </div>`).join('');
}

// ── Skeleton ──────────────────────────────────────────────────────────────────
function showSkeleton(n = 16) {
  const cards = Array(n).fill(`
    <div class="sk-card">
      <div class="sk-thumb"></div>
      <div class="sk-body">
        <div class="sk-line w80"></div>
        <div class="sk-line w50"></div>
      </div>
    </div>`).join('');
  document.getElementById('content').innerHTML = `<div class="skeleton-grid">${cards}</div>`;
}

// ── Rendu cards ───────────────────────────────────────────────────────────────
function renderCards(videos, title) {
  const content = document.getElementById('content');
  if (!videos.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">Aucun résultat</div></div>`;
    return;
  }
  const cards = videos.map(v => `
    <div class="video-card" onclick="openVideo('${v.id}')">
      <div class="thumb-wrap">
        <img src="${escHtml(v.thumbnail||'')}" alt="" loading="lazy"
             onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
        <div class="thumb-gradient"></div>
        ${v.duration ? `<div class="duration-badge">${fmt(v.duration)}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(v.title)}</div>
        <div class="card-meta">
          <span>${escHtml(v.channel||'')}</span>
          ${v.views     ? `<span class="sep">·</span><span>${fmtViews(v.views)}</span>` : ''}
          ${v.published ? `<span class="sep">·</span><span>${fmtDate(v.published)}</span>` : ''}
        </div>
      </div>
    </div>`).join('');
  content.innerHTML = `<div class="section-title">${escHtml(title)}</div><div class="video-grid">${cards}</div>`;
}

// ── Tendances ─────────────────────────────────────────────────────────────────
async function loadTrending() {
  setNavActive('nav-trending');
  setSNavActive('snav-trending');
  showSkeleton(20);
  try {
    const r = await fetch(`${API}/api/trending`);
    renderCards((await r.json()).results || [], 'Tendances');
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Erreur de connexion au backend</div></div>`;
  }
}

// ── Recherche ─────────────────────────────────────────────────────────────────
async function doSearch(q = '') {
  q = q.trim();
  if (!q) return;
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('player-view').classList.remove('active');
  setNavActive('nav-search');
  setSNavActive(null);
  showSkeleton(12);
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&limit=30`);
    renderCards((await r.json()).results || [], `Résultats pour « ${q} »`);
  } catch {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur de connexion</div></div>`;
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
async function openVideo(videoId, resumeAt = 0) {
  cancelAutoNext();
  currentVideoId = videoId;
  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('player-view').classList.add('active');
  document.getElementById('video-meta').innerHTML   = `<div class="loader"><div class="spinner"></div><span>Chargement…</span></div>`;
  document.getElementById('sb-panel').innerHTML      = '';
  document.getElementById('quality-bar').innerHTML   = '';
  document.getElementById('related-panel').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  try {
    const [infoRes, sbRes] = await Promise.all([
      fetch(`${API}/api/video/${videoId}`),
      fetch(`${API}/api/sponsorblock/${videoId}`)
    ]);
    const info   = await infoRes.json();
    const sbData = await sbRes.json();

    currentVideoMeta = { id: videoId, title: info.title, thumbnail: info.thumbnail,
                         channel: info.channel, duration: info.duration };

    // Check history for resume point if not passed explicitly
    if (!resumeAt) {
      const hist = getHistory().find(h => h.id === videoId);
      if (hist && hist.currentTime > 10) resumeAt = hist.currentTime;
    }

    const color   = channelColor(info.channel);
    const initial = (info.channel || '?').charAt(0).toUpperCase();
    document.getElementById('video-meta').innerHTML = `
      <div class="player-title">${escHtml(info.title)}</div>
      <div class="player-channel">
        <div class="channel-avatar" style="background:${color}22;color:${color}">${initial}</div>
        <div>
          <div class="channel-name">${escHtml(info.channel || '')}</div>
          <div class="channel-stats">
            ${fmtViews(info.views)}${info.published ? ' · ' + fmtDate(info.published) : ''}
          </div>
        </div>
      </div>
      ${info.description ? `<div class="player-desc">${escHtml(info.description)}</div>` : ''}
    `;

    const qBar = document.getElementById('quality-bar');
    if (info.formats?.length) {
      qBar.innerHTML = `<span class="q-label">Qualité</span>`;
      info.formats.forEach((f, i) => {
        const btn = document.createElement('button');
        btn.className = 'q-btn' + (i === 0 ? ' active' : '');
        btn.textContent = f.quality ? `${f.quality}p` : f.format_id;
        btn.onclick = () => {
          document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadStream(videoId, f.quality || 720);
        };
        qBar.appendChild(btn);
      });
    }

    loadStream(videoId, info.formats?.[0]?.quality || 720, resumeAt);
    document.getElementById('player').addEventListener('ended', startAutoNext, { once: true });

    sbSegments = sbData.segments || [];
    renderSponsorBlock(sbSegments);
    startSBMonitor();
    loadRelated(videoId, info.title);
    startProgressTracking();

  } catch {
    document.getElementById('video-meta').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Impossible de charger la vidéo</div></div>`;
  }
}

function loadStream(videoId, quality, resumeAt = 0) {
  const player    = document.getElementById('player');
  const savedTime = resumeAt || player.currentTime;
  player.src      = `${API}/api/stream/${videoId}?quality=${quality}`;
  if (savedTime > 0) {
    player.addEventListener('loadedmetadata', () => {
      player.currentTime = savedTime;
      player.play().catch(() => {});
    }, { once: true });
    player.load();
  } else {
    player.load();
    player.play().catch(() => {});
  }
}

// ── Suivi de progression ──────────────────────────────────────────────────────
let _progressInterval = null;
function startProgressTracking() {
  if (_progressInterval) clearInterval(_progressInterval);
  _progressInterval = setInterval(() => {
    const p = document.getElementById('player');
    if (!currentVideoId || !p || !p.duration || p.paused) return;
    const m = currentVideoMeta;
    saveProgress(currentVideoId, m.title, m.thumbnail, m.channel, p.duration, p.currentTime);
  }, 5000);
}

// ── Raccourcis clavier ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!currentVideoId) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const p = document.getElementById('player');
  switch (e.key) {
    case ' ': case 'k':
      e.preventDefault();
      p.paused ? p.play() : p.pause();
      break;
    case 'ArrowLeft': case 'j':
      e.preventDefault();
      p.currentTime = Math.max(0, p.currentTime - 10);
      showToast('⏪  −10s');
      break;
    case 'ArrowRight': case 'l':
      e.preventDefault();
      p.currentTime = Math.min(p.duration || 0, p.currentTime + 10);
      showToast('⏩  +10s');
      break;
    case 'ArrowUp':
      e.preventDefault();
      p.volume = Math.min(1, +(p.volume + 0.1).toFixed(1));
      showToast(`🔊  ${Math.round(p.volume * 100)} %`);
      break;
    case 'ArrowDown':
      e.preventDefault();
      p.volume = Math.max(0, +(p.volume - 0.1).toFixed(1));
      showToast(`🔈  ${Math.round(p.volume * 100)} %`);
      break;
    case 'f':
      e.preventDefault();
      document.fullscreenElement ? document.exitFullscreen() : p.requestFullscreen?.();
      break;
    case 'm':
      e.preventDefault();
      p.muted = !p.muted;
      showToast(p.muted ? '🔇  Muet' : '🔊  Son activé');
      break;
  }
});

// ── SponsorBlock ──────────────────────────────────────────────────────────────
const SB_LABELS = {
  sponsor:'Sponsor', selfpromo:'Auto-promo', interaction:'Interaction',
  intro:'Intro', outro:'Outro', preview:'Aperçu',
  filler:'Remplissage', music_offtopic:'Hors-sujet'
};
function renderSponsorBlock(segs) {
  const panel = document.getElementById('sb-panel');
  if (!segs.length) {
    panel.innerHTML = `<div class="sb-panel"><div class="sb-panel-title">SponsorBlock</div><div style="font-size:12px;color:var(--text3)">Aucun segment pour cette vidéo</div></div>`;
    return;
  }
  panel.innerHTML = `
    <div class="sb-panel">
      <div class="sb-panel-title">SponsorBlock — ${segs.length} segment(s)</div>
      ${segs.map(s => `
        <div class="sb-segment">
          <span class="sb-cat">${SB_LABELS[s.category]||s.category}</span>
          <span style="font-family:'DM Mono',monospace;font-size:11px">${fmt(s.segment[0])} → ${fmt(s.segment[1])}</span>
        </div>`).join('')}
    </div>`;
}
function startSBMonitor() {
  if (sbCheckInterval) clearInterval(sbCheckInterval);
  const p = document.getElementById('player');
  sbCheckInterval = setInterval(() => {
    if (!sbSegments.length || !sbActive) return;
    const t = p.currentTime;
    for (const seg of sbSegments) {
      const [start, end] = seg.segment;
      if (t >= start && t < end) {
        p.currentTime = end;
        showToast(`SponsorBlock : « ${SB_LABELS[seg.category]||seg.category} » sauté`);
        break;
      }
    }
  }, 500);
}

// ── Recommandations & Auto-play ───────────────────────────────────────────────
async function loadRelated(videoId, title = '') {
  const panel = document.getElementById('related-panel');
  panel.innerHTML = `<div class="loader"><div class="spinner"></div><span>Recommandations…</span></div>`;
  try {
    const qs = title ? `?q=${encodeURIComponent(title)}` : '';
    const data = await (await fetch(`${API}/api/related/${videoId}${qs}`)).json();
    relatedVideos = data.results || [];
    renderRelated(relatedVideos);
  } catch {
    relatedVideos = [];
    panel.innerHTML = '';
  }
}
function renderRelated(videos) {
  const panel = document.getElementById('related-panel');
  if (!videos.length) { panel.innerHTML = ''; return; }
  panel.innerHTML = `
    <div class="related-section-title">À regarder ensuite</div>
    ${videos.map(v => `
      <div class="related-card" onclick="openVideo('${v.id}')">
        <div class="related-thumb">
          <img src="${escHtml(v.thumbnail||'')}" loading="lazy" alt=""
               onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
          ${v.duration ? `<div class="duration-badge">${fmt(v.duration)}</div>` : ''}
        </div>
        <div class="related-info">
          <div class="related-title">${escHtml(v.title)}</div>
          <div class="related-meta">${escHtml(v.channel||'')}${v.views?` · ${fmtViews(v.views)}`:''}</div>
        </div>
      </div>`).join('')}
  `;
}
function startAutoNext() {
  if (!relatedVideos.length) return;
  const next = relatedVideos[0];
  document.getElementById('autonext-next-title').textContent = next.title;
  let count = 5;
  document.getElementById('autonext-count').textContent = count;
  document.getElementById('autonext-overlay').classList.remove('hidden');
  autoNextTimer = setInterval(() => {
    count--;
    document.getElementById('autonext-count').textContent = count;
    if (count <= 0) { cancelAutoNext(); openVideo(next.id); }
  }, 1000);
}
function cancelAutoNext() {
  if (autoNextTimer) { clearInterval(autoNextTimer); autoNextTimer = null; }
  document.getElementById('autonext-overlay')?.classList.add('hidden');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderContinueWatching();
initAuth().then(() => {
  if (!authState.authenticated) loadTrending();
  // showHome() gère déjà le chargement du feed si connecté
});
</script>
