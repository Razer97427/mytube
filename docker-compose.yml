version: "3.9"

services:

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    ports:
      - "4416:4416"
    volumes:
      - pot_data:/app/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - POT_PROVIDER_URL=http://pot-provider:4416
      - SPONSORBLOCK_API=https://sponsor.ajay.app
      - SESSION_SECRET=${SESSION_SECRET:-changeme_in_production}
    depends_on:
      - pot-provider
    volumes:
      - yt_cache:/app/cache

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pot_data:
  yt_cache:
