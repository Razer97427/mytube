version: "3.9"

services:

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    ports:
      - "4416:4416"
    volumes:
      - pot_data:/app/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - POT_PROVIDER_URL=http://pot-provider:4416
      - SPONSORBLOCK_API=https://sponsor.ajay.app
      # ── Google OAuth2 (optionnel — requis pour connexion compte) ──────────
      # 1. Créer un projet sur https://console.cloud.google.com
      # 2. Activer "YouTube Data API v3" + "OAuth consent screen"
      # 3. Créer des identifiants OAuth 2.0 (type : Application Web)
      # 4. Ajouter l'URI de redirection : http://VOTRE_IP:3000/auth/callback
      # 5. Renseigner les variables ci-dessous
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://localhost:3000}
      - SESSION_SECRET=${SESSION_SECRET:-changeme_in_production}
    depends_on:
      - pot-provider
    volumes:
      - yt_cache:/app/cache

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pot_data:
  yt_cache:
